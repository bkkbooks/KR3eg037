body:
  text: 後卷痧脹看症法治病須憑脈若犯痧脹則脈不對症症不合脈或云痧筋為據亦為現外焉且痧脹有為食積阻滯者有為血痰阻滯者或阻於上或阻於中或阻於下又或阻於左或阻於右或阻於兩腰脅苟非辨症的確求其中病也難矣故治痧脹一見脈之不合先看痧筋次審氣色三聽聲音四推犯病之由其間或有食積血痰阻於上中下左右各處之分須細辨其病原後用藥不誤也凡痧脈有一部獨異有六脈俱異即有異之中亦有陰陽虛實脈之神氣可辨要非一端可執尚其審諸放痧辨或曰子於痧也有先用藥而放刮者有先放刮而用藥者非放與刮治更無別法歟曰放刮之法猶犯傷寒太陽經症必用羌活麻黃等藥少陽經症必用柴胡黃芩等藥症有所犯治有所宜凡氣分有痧宜用刮血分有痧宜用放此不易之法至臟腑經絡有痧若昏迷不醒等症非放刮所得治兼用藥療之無足怪也痧脹麻疹不同辨麻疹之發因傷風熱故身體壯熱咳嗽煩悶即是癍疹之候麻疹在他方有名厝子有名蚤疹在槜李則名痧子而痧脹亦名為痧不可不辨麻疹因傷風肌表必虛則毒氣乘虛而泄故藥雖或涼仍可用熱飲若痧脹或因穢氣所觸或因暑氣所感或動時行不正之氣或乘伏寒伏熱過時而來總不起於外傷風熱故肌表必實實則熱毒之氣既脹於胸腹腸胃之中若更用熱飲則熱氣適助其腫脹無從而泄故犯此者有立時脹死此不可不辨也痧脹治猶麻疹論痧疹之發必欲盡透故治麻疹須要見於肌表者多多則毒氣俱泄然後腸胃不留餘毒治痧在肌表者用刮在血肉者用放亦猶治麻疹須盡透肌表之謂也痘麻穢觸相同痘瘡為穢氣所觸即時作變痧脹也麻疹為穢氣所觸即時反隱亦痧脹也若暑氣時行不正之氣感為痧者詎無相類者歟治驗一陳姓婢十四歲四月壯熱煩悶腹痛身重斑痧遍體脈微而細觸穢之症也閱腿彎痧筋放七針手指放十餘針俱紫黑毒血煩悶稍松用寶花散阿魏丸清茶微冷飲之又付活血順氣之劑腹痛遂止斑痧漸散身體輕快痘即起發視其形色已四朝矣後皆如期灌脹收靨而愈可見痘中觸穢因痧而隱者比比也兼痧傷寒不同辨犯傷寒者有外感三陽之寒有直中三陰之寒兼痧者非可俱兼也痧者熱毒也熱毒入里內作腫脹熱毒發外肌膚腫脹或升頭面或散四肢此等惡疾俱由熱毒之氣所攻也若直中三陰之真寒症無有兼痧者蓋三陰既已直中則熱氣與寒氣所拒無由而入也至於外感三陽或先受痧而感寒或先受寒而感痧或痧毒驟發熱極而生寒戰甚至於手足厥冷則俱有之若先有痧而感寒者知其慢痧方可暫散寒邪而後治痧先有寒而感痧者痧症為重當先治痧而後治寒至如痧毒驟發熱極而生寒戰手足厥冷者緊痧也若一誤服用發散升提溫飲之藥須防時刻凶危急用涼水飲之稍解胸腹中熱脹之氣然後或刮或放用藥治之諸痛類痧辨腹痛不一有食有氣有火有冷有蟲有積俱似痧非痧不可無辨食者失飢傷飽聚中脘作痛其症遇食即疼胸膈飽悶似痧者一然按脈氣口必然有力可辨若因冷食入胃食與寒氣相搏於中則心脾鬱結胸脅滿悶中脘作痛似痧者二然按脈氣口必然無力但有嘈雜沖胸噯氣吞酸可辨氣者因怒氣所傷不得發越胸膈氣塞沖激心脾嘔逆噁心吐不能出其疼手不可按坐臥不定奔走叫呼似痧者三然按脈兩關必然洪大餘部俱必應指及刮之無痧痧筋不現可辨火者因熱作痛胃火上逆嘔吐酸水必然口渴欲飲飲入即吐其症手足溫暖面帶陽色似痧者四然按脈六部洪數又與痧類難以細分必看痧筋兼用刮法可辨冷者人屬虛寒沉寒作痛其脈必然平軟似痧者五但飲熱則安飲冷痛發可辨蟲者胃脘疼痛有如刀觸痛極按心搔爬難定兼之脈息無倫徐疾不一似痧者六然蟲必有因各有所喜如茶蟲喜食茶葉糖蟲喜食糖物或泥或絮或酒或鹽其為蟲也必有一好食之便安若遇檳榔五靈脂殺蟲等藥或藥性力薄不能驅逐而出勢必咬齒翻動腸胃更加疼痛可辨積者舊有宿積聚結腸胃忽因行動作痛作疼似痧者七然痧筋罕現刮痧無影可辨如是辨之的確方知痧痛詳明治之得法然此諸痛又有兼痧者將論脈閱筋而加察焉鮮有不得其理矣諸症不類痧辨凡心腹脹痛因痧既知之矣痧症仍有不痛不脹者或兼痧或暗痧誤飲溫熱便致凶危等也余竊謂凡遇危症病家不識痧筋猶用刮痧可辨醫家或認脈不清尚有痧筋可詳若內人不便閱視果緣痧脹凶極脈未有對症者以是辨之百不失一也論脹脹者氣之閉也氣為毒壅故作腫作脹所以治痧先當治氣如食阻其氣於上則吐之食壅其氣於中則消之食化而結其氣於下則導之凡諸積之阻滯概然凡下竅閉者多上吐或吐蛔或吐血當導氣於下中竅閉則下瀉或瀉水或瀉蛔當行氣於中上竅閉而復升則作悶或頭疼或上腫俱當用清涼引下之至如氣為毒壅必傷血分若乃血為毒凝活血為上血為毒壅破血為先血為毒聚且結敗血為要故治痧必兼治血蓋血活毒氣行血破毒氣走血敗毒氣散如是毒氣不留治斯效也凝壅聚結辨凝壅聚結皆為血分痧毒惡症其間有輕重之別凝者初犯之症壅者凝多而壅聚者血壅或左或右結者血滯一處故痧毒中血分結為重聚次之壅又次之凝為輕凝以紅花澤蘭為主壅以延胡索桃仁為主聚以蘇木茜草為主結以五靈脂降香為主輕者用藥不可重重則恐傷本原重者用藥不可輕輕則治之不效治驗一尹鈞萬咳嗽痰喘有以緊勞治之病日增背鞠如弓手足蜷緊不能展動咳則胸腹百骸吊痛延余診之脈洪大無倫此毒血壅聚也兼又難刮難放先以圓紅散微冷飲之兩手稍松漸為放刮訖又以圓紅散加三七鬱金末微溫飲之更以蘇木茜草為主多加順氣活血之類如前飲之計日放痧一次者四日用藥一服者五遂痊一萬君安內室兩脅如痞按之則痛心胃間高起服藥難療延余左脈微細右脈洪大此慢痧痧毒結聚也計放痧三次付以五靈脂降香為主加桃仁延胡索及消食行氣之類日用一服計十二劑如舊一陳弘業寒熱嘔吐苦難俯仰腹中脹痛夜不能寐六脈弦細而緊數刮放略鬆用紅花澤蘭劉寄奴茜草桑寄生並行氣消食之藥微溫飲之二劑而愈治痧救人脈論或謂余曰古書所載屋漏雀啄諸怪脈現者死脈代者死為五臟有絕也見一部無脈二三部無脈焉得有生理乎及覽玉衡痧脈止有六部無脈者死即諸怪脈必曰放痧服藥不應者死與古書所載不同何歟曰古人論此等脈為死脈者其常也餘論此等脈尚當救之者因乎痧之變也凡痧脹之脈都有類諸死脈者余惟見此疾實憐之冀萬有一可救者因痧之變不執常脈而輕棄之也治驗一陳見雅內室懷娠發熱赤痢腹痛不止服他藥不效余診之脈四動一止代脈也閱有痧筋放二十餘針用寶花散微冷服之付以桑寄生益母草連翹蘇梗紅花金銀花山楂卜子當歸枳殼青皮黃芩微冷飲四劑而愈一張舜瞻側室腹疼嗽痰嘔吐延余脈如彈石知其患痧痛極脈亦變也令其婢放痧三十餘針用寶花散救苦丹砂仁湯稍冷飲之付以獨活紅花湯加山楂神麯卜子青皮微冷飲二劑而愈一傅純宇發熱昏沉脈如解索先用陰陽水搗芋艿汁飲之放指臂痧三十餘針稍覺清爽用細辛大黃丸清茶稍冷飲之付以荊芥銀花湯加青皮微溫服二劑而痊一鄔云公頭面紅腫目閉喉痛六脈無根知其痧氣阻塞脈路也刺腿足痧四十餘針流紫黑血甚多又刺手臂痧二十餘針未愈用清涼至寶飲減細辛加山豆根射干牛膝石斛桑皮枳殼稍冷飲三劑而痊一金子近次子祖翼九月間適因勞動飲食不時忽壯熱頭痛自以紫蘇湯熏頭而大汗胸中脹悶他醫用藥下之反口吐白沫時有議以為痧乃更延醫診視見舌苔灰色以傷寒藥治之子近恐犯痧氣先以半小鐘試服少頃即譫語片時而止熱仍不解愈覺沉重脈有八至遂連易三醫皆云傷寒三次服藥皆昏沉譫語如前第五日眼如火赤唇若塗朱鼻如煙煤舌苔黑燥枯乾而短聲音不清足冷至腹陰囊卵縮肉脫神昏醫者皆辭不治已備後事至七日乃始放痧因病勢危篤止放二針唇眼舌聲諸死症頓愈陰囊二卵漸舒脈竟平復始現腹痛乃知口渴因惑人言痧症不可服藥止飲童便服紫金錠而痛止後又隨痛隨服繼進飲食大便乾結至十八日用蜜導法遂變下痢日夜五六十次凡六日始服痧症藥一劑即安睡痢乃止後延他醫調理補之不數日睡時即發遍身水晶㾦癗覺時即隱醫家莫解其故子近因刮穿頸額間㾦癗流出皆汗也即盜汗不止他醫咸謂久病虛脫大用補劑斂汗不惟無益更加自汗且完穀不化小便短赤頻數變為砂淋醫又皆束手謝事爰復放痧用八正散二劑服之痧氣始轉身即壯熱約有二更時身涼汗止惟日食生茨菇五六日砂淋亦止而全愈祖翼之病變幻遲久總因止放二針不服痧症藥以除根之故也究以治痧而得全脈而八至死症雖多其可棄耶一金子近長子權可八月間發癍通身如麻疹狀延他醫視之則日癍疹復延幼科診之亦云痧疹服藥十日不退脈僅二至醫家因疑其少年鑑喪故而虛脫欲用補劑子近恐亦痧氣不敢服命權可起而視之則遍身痧點皆活動流注兩腿皮肉紅紫因放腿彎痧一針而皮肉白又放腿彎痧數針而皮肉皆白惟小腿紅紫未退臥即複流動遍散於身仍作稀稀癍點緣脈尤二至用川烏草烏為一小丸服之脈復如常大汗出而全愈痧筋統說或曰前書放痧有十今放痧者奚不止於此余曰遍身青筋古有載矣謂放痧有十者不過就痧毒先達臟腑者明之爾至腿彎痧筋尤人易曉余詳之為初學者便推而廣之寧有暨乎傷風痧脈辨或曰前子傷寒辨痧詳矣若犯痧似傷風何如余曰肺主皮毛心主血肝主筋傷風犯痧三部見者居多且風陽也風傷衛仕表故脈浮傷風有汗表虛也故脈緩有犯此症脈不浮緩反見沉緊或洪大痧脹一驗也若傷風帶寒鼻塞畏冷脈當浮而微緊脈反沉伏或芤長痧脹二驗也若傷風熱鼻塞聲重喉痛脈當浮而微數脈反沉緊或芤或伏痧脹三驗也若傷風有痰氣急發喘脈當浮滑反微澀沉伏痧脹四驗也以此推之足矣治驗一駱叔源傷風發熱咳嗽痰喘已半月矣左脈沉伏右脈澀而微數此慢痧為患也左腿彎放二針紫黑血流至足又刮痧不愈付寶花散加明礬末稍冷湯飲之用荊芥湯減川芎加蘇子紅花蒲黃土貝母烏藥微冷飲之而愈一高充謨傷風鼻塞肩背拘急頭頂疼痛有以足太陽膀胱經藥治之頭頂益痛叫喊不已甚至肩背沉重時覺昏迷延余治之左寸微伏右關芤大先服圓紅散稍醒刺腿彎六針不愈用寶花散清茶微冷飲之肩背稍轉頭痛少安詢所服者腹中覺冷即用防風散痧湯減枳殼加羌活川芎紫蘇烏藥溫飲寒散而安一凌公遠內室傷風喉啞胸腹飽悶兩關俱芤余曰芤者瘀血未有上下俱瘀其痧乎其家人刮之紫痧甚多飽悶即解付獨活紅花湯加射干前胡薄荷石斛連翹玄參三劑微冷飲之傷風喉啞俱痊眩暈痧脈辨暈有血暈氣暈痰暈火暈濕暈暑暈有血虛發暈有氣虛發暈有風中而暈有寒中而暈有勞力而暈今加之以痧暈古人無治古書無論何以知之大都血暈脈芤氣暈脈沉痰暈脈滑火暈脈數濕暈脈濡暑暈脈虛血虛發暈脈澀氣虛發暈脈微風中而暈脈浮緩寒中而暈脈弦緊勞力而暈脈右尺浮洪此暈脈之大略也若病似血暈脈反短似氣暈脈反浮似痰暈脈反澀似火暈脈反遲似濕暈脈反勁似暑暈脈反實似血虛發暈脈反滑似氣虛發暈脈反大似風中而暈脈反沉緊似寒中而暈脈反微緩似勞力而暈脈反細實是皆脈症不合余歷驗之而信其為痧此痧暈之治不誣也治驗一陳肅遠嘗苦發暈醒則日夜頭眩余往候之脈右虛左實徐疾不常余曰此非放痧不可放腿彎上下放十餘針紫黑血流如注指上亦放二十餘針用寶花散沉香阿魏丸清茶稍冷飲之付防風勝金湯加桃仁紅花稍冷飲之後遂不復患眩暈一姜渭濱內室正月間驟然發暈一日三次舉家惶恐余見其脈沉而微緊令其婢為指上放痧三十餘針用救苦丹加沉香末清茶稍冷飲之付荊芥銀花湯加卜子枳殼一劑而痊一梅君玉子三月間吐蛔發暈昏沉不醒六脈俱伏左右虎口脈青色放指頭痧一十八針用細辛大黃丸清茶調黑糖稍冷飲之漸蘇付蒲黃飲減薑黃加陳皮烏藥紅花微冷湯調黑糖飲之乃愈一霍庭賢內室四月間壯熱面赤口渴唇焦有以陽明胃經症藥治之遂發暈終日不醒余診之脈兩寸弦細兩關沉微兩尺左大右緊曰脈症不合痧毒內攻也先用蘇木散砂仁湯微冷飲之令其老婦放指上痧二十餘針血色墨黑猶不醒後令放乳邊痧二針乃蘇餘症不減用蒺藜散微溫湯飲之付桃仁紅花湯加枳殼四劑下盡惡毒黑物而痊一盛思虞六月間飲酒頭汗發暈脈寸關洪大無倫兩尺脈伏閱痧筋放十餘針皆紫黑毒血付陳皮厚朴湯加乾葛山楂卜子微冷飲之而醒又用藿香湯加黃連黃芩乃安痧脹舌胎論或謂全書載痧論治俱備舌胎僅存其名豈痧脹舌胎無可治乎余曰非也蓋謂痧脹有別症之舌胎則可謂舌胎即痧脹之症是不識痧脹之適當其然並不識舌胎之所以然也誠以舌胎乃足陽明胃腑熱病故治痧脹先理其痧後治舌胎即安若先理舌胎後治痧脹則危蓋舌胎乃胃腑熱極氣衝心胸舌為心苗故見胎則宜石膏黃連大黃黃芩黃柏之類若不先治痧恐此等藥又寒凝血分反成大患故治此者要看痧毒一退即治舌胎可也治驗一翁在茲發熱口渴舌有黑胎臥難轉動氣急痰喘六脈洪實放痧三十餘針未愈用圓紅散砂仁湯微溫飲之又付必勝湯大便下黑糞惟口渴黑胎未愈加石膏黃連二劑而瘳一曹華宇長子十一月間犯傷寒兼痧舌卷耳聾舌上黑胎芒刺大渴昏沉發熱身重不能轉側胸中迷悶瀉痢清水先以圓紅散加鬱金末清茶稍冷飲之放指上痧三十餘針未愈用阿魏丸付以防風散痧湯合稜術湯加桃仁紅花一劑俱微冷飲之舌卷耳聾漸愈瀉水即止大渴稍解但舌胎不退胸中飽悶詢其腹中厭冷痧氣已絕用和脾宣化飲減前胡大腹皮加桃仁紅花枳實青皮石膏黃連大黃微溫飲之食結飽悶俱消黑胎芒刺皆退惟大便不通用大黃三錢芒硝一錢溫飲之大便通而愈一張旋庵內室傷食飽悶按之則痛日晡發熱舌心焦黃芒刺延余脈微無力余曰痧也放腿彎痧三針流紫黑毒血用紫樸湯加柴胡乾葛微冷飲之後加石膏黃連大黃黃柏溫飲四劑大便下宿糞而愈一龔雲濤發熱嘔噦舌有黑胎芒刺起二大泡蜷臥聲重迷悶幾死脈左弦緊右微細放腿上痧三十餘針用三黃石膏湯微溫飲之稍愈驟進飲食迷悶復發用消食順氣之劑後加大黃芒硝大便通而安麻疹兼痧脹麻疹方惟是升發清涼解利茲競有若此不治者因不知麻疹中有痧也蓋麻疹乘虛而發若穢氣暑氣時行不正之氣亦可乘病而感苟犯痧者但先治痧脹麻疹自發自散蓋麻疹兼痧脹痧脹為難麻疹反隱而難現不可不辨也治驗一金權可二月間犯時行麻疹心胸煩悶延余治之脈症不合放痧後用寶花散並活血順氣消食之劑俱調黑糖侯稍冷飲之復刮痧訖如前二劑乃安一潘質黃子犯麻疹脈微放腿彎痧二針血流紫色又放指上痧三十餘針付圓紅散並清涼至寶飲合紅花湯俱微冷飲之即愈一余弟驤武子八歲正月間犯麻疹胸腹脹悶煩躁熱渴咳嗽氣急面赤身熱脈不洪大反見細數放腿彎痧二針付圓紅散沉香丸用荊芥薄荷湯合枳實大黃湯俱微冷飲之麻疹即發透隨散而愈其時一僕婦亦咳嗽煩悶同犯麻疹如上治而痊一王日斯女壯熱咳嗽麻疹初現氣急面赤脈症不合放指上痧二十餘針付圓紅散加沉香末調黑糖湯稍冷飲之用清氣化痰飲合蒲黃飲均微冷飲之即發透隨散而愈痧脹兼麻疹傷風咳嗽煩悶為麻疹之候然亦有麻疹未發或觸穢氣或感暑氣或吸時行不正之氣當即痧脹或心痛腹痛或脹悶喘急或遍身疼痛或發暈昏沉一似麻疹不發內攻心腹痛及周身使止認為麻疹之候升發之勢必危殆不知傷風咳嗽煩悶雖有麻疹發於日後其痧脹內攻即麻疹有現形者因之反隱更助痧脹為禍況麻疹未形痧脹沉重可不先救痧脹乎治驗一陸迪安內人發熱咳嗽胸腹疼痛叫喊非常脈症不合令其僕婦放腿彎痧未愈先以寶花散阿魏丸清茶稍冷飲之付必勝湯減大黃加枳實連翹卜子二劑微冷飲之疼痛稍已次日如前劑減五靈脂加荊芥黃芩微溫飲之疼痛乃止麻疹即發再劑而痊一沈端肱女咳嗽發熱脹悶不已六脈弦緊或時歇指放指頭痧二十餘針未愈用寶花散加沉香末稍冷飲之付防風勝金湯加紅花荊芥治之麻疹隨發用荊芥湯減川芎加黃芩玄參金銀花微溫飲二劑而瘳一陳弘甫傷風發熱咳嗽煩悶脈左沉右洪放乳上痧二針用紫樸湯冷飲麻疹漸現次日為穢氣所觸復隱隱不發刮兩臂肩背痧用荊芥湯減川芎加黃芩銀花紅花沙參烏藥微冷飲之麻疹即發再劑而愈一高子良弟四歲正月間傷風咳嗽煩悶有以麻疹治之不發反吐血發暈昏沉延余脈症不合放舌下痧二針付紫樸湯加黃芩微冷飲之麻疹始現次日稍飲溫茶半鍾麻疹復隱余曰痧脹餘毒復發內攻故麻疹隨之而隱又刮痧畢服必勝湯減大黃五靈脂貝母加黃芩飲之麻疹即透後惟清涼解毒而痊痧脹類麻疹或謂余曰痧脹之發即麻疹也子於痧脹特多放痧之法爾不知所放之痧即放麻疹之脹氣也安得云麻疹非痧脹之標痧脹非麻疹之本歟余曰我見麻疹從傷風咳嗽而發者有矣未聞有感穢氣發麻疹感熱天暑氣發麻疹者豈非麻疹自有麻疹病痧脹自有痧脹病乎況痧脹既云即麻疹何以有麻疹因穢氣暑氣所乘兼痧脹麻疹即隱而不發必俟放刮後麻疹始發乎乃知麻疹不與痧脹同故刮者放者各痧脹雖有刮出之痧不可即認為麻疹其痧脹亦不與麻疹同必因傷風所發始為麻疹實不同也乃茲有痧脹不因傷風發熱咳嗽所起嘗見刮放用藥後發出遍身形影如麻疹者雖形似麻疹實非麻疹故名之為類麻疹焉或曰詎有非麻疹而形可同於麻疹者曰此亦猶痧毒發為腫毒發為紫疱之類爾何疑乎治驗一聞德音內人腹中疼痛右脈微而弦左脈細而澀令其婢放腿彎痧三針血流紫黑色未愈用寶花散救苦丹清茶稍冷飲之付以和脾宣化飲加茜草桃仁微冷飲之發出一身類麻疹者余用防風散痧湯減細辛加連翹紅花金銀花桃仁治之而痊一施均季孫女發熱咳嗽腹脹昏沉微有麻疹形影大便瀉黃水有用升發之藥不效延余治之脈上盛而下虛乃知發熱咳嗽雖本傷風實非因傷風而有麻疹形影也放指頭痧二十餘針用圓紅散調黑糖微冷湯飲之稍覺清爽用獨活紅花湯加山楂卜子澤蘭治之連送二劑大便下盡黑物而愈章漣漪三子發熱昏沉腰脅間微有形影與麻疹相似有用升發之劑惟恐不透次日迎余六脈歇指余曰麻疹之病何遽爾歇指耶雖昏沉氣喘喉無痰聲脈不合症斯痧脹之類麻疹者歟放頭頂痧兼放左太陽及乳上痧三針未愈用荊芥湯加山稜蓬朮白蒺藜微冷飲之發一身類麻疹者遂安一薛思高發熱迷悶氣不得舒胸腹頭面有麻疹形余診之兩關俱芤此痧脹之類麻疹也放痧十餘針又刮痧訖用沉香郁金散清茶稍冷飲之而痊一張省原子胸腹飽悶昏沉不醒痧筋不現但微有麻疹形脈左寸關沉細如無右寸亦伏余思麻疹脈不若是令其家人用燈心蘸菜油點火焠之即醒但飽悶未解用寶花散加沉香蒲黃清茶微冷飲之付奏敳和解飲減山藥人參甘草加桃仁紅花治之而愈麻疹後復痧脹問痧脹有愈而屢屢復發者矣若麻疹有愈而屢屢復發者乎曰無有然則謂麻疹即痧脹謬矣使有犯麻疹復痧脹乃即以治麻疹法治之誤莫大焉故曰麻疹後復痧脹不可不知治驗一王日斯幼女正月間麻疹後瀉痢白色治之稍安驟然腹痛脈短而微余曰此穢氣新觸作痛非麻疹之故放指上痧二十餘針未愈用救苦丹清茶稍冷服之付藿香湯加卜子紅花烏藥木通微冷飲之即痊一陶元升麻疹後忽壯熱面赤痰喘不已兩額太陽抽痛異常脈不洪滑反濡細痧氣阻塞脈路也痰喘不已痧氣上壅也兩額太陽抽痛痧毒上攻三陽也其面赤發熱者毒盛極而攻表也均不因麻疹而然啟腿彎痧筋放六針毒血墨黑未愈用清涼至寶飲減細辛加黃芩乾葛紅花牛膝木通微冷飲二劑漸安但腹中飽悶按之則痛用丁沉阿魏丸微溫飲之又付必勝湯溫飲四劑下盡黑惡毒物而愈一殳鈞甫子二月間麻疹後遍身疼痛不能轉側有似麻疹餘毒治之反加沉重延余脈累累如貫珠時一促疾蓋遍身疼痛不能轉側者痧脹毒攻血分也脈累累如貫珠疾促者痧脹於中筋脈縮急而然也反加沉重者誤飲溫熱痧毒內攻勢盛也放腿彎痧四針及臂指痧二十餘針咸流紫黑血未愈用桃仁紅花湯加牛膝山楂枳殼磨降香微溫服四劑而安麻疹夾痧脹蛔結麻疹治法易明若夾痧脹不放不刮或犯痧脹之禁麻疹亦隨痧脹反攻臟腑蛔不能存非吐而出即從大便而下否則結於大腸臍中作痛治宜先施刮放後用芒硝大黃攻其死蛔宿糞令毒從大便而出則痧脹乃解麻疹輕者自消重者自發矣治驗一劉香仲孫女二月間傷風發熱咳嗽麻疹隱現不發喉啞失音臍腹疼痛昏悶沉沉前醫不治延余左脈芤右脈澀時有歇指以火照手背指上痧筋放二十餘針用沉香丸清茶稍冷飲之付紫樸湯合荊芥銀花湯俱微冷飲之後連放指頭痧二次如前藥加黃芩石膏芒硝大黃微溫飲之喉稍有聲乃去石膏加黃柏溫飲之下死蛔四條大便通而愈一劉姓婢犯麻疹發熱咳嗽腹痛脈洪大無倫亦夾痧脹者也放腿彎痧五針紫黑毒血成流又放指頭痧二十餘針用桃仁紅花湯減蘇木合荊芥湯減川芎加黃芩微冷飲之下蛔二條而痊一過洪甫發熱咳嗽吐瀉麻疹現而復隱口渴唇焦鼻紅瀉血舌有黃胎繞臍硬痛叫喊非常醫治不應其弟德甫延余治之左脈俱伏右脈洪緊放指頭臂上痧三十餘針用獨活紅花湯加石膏黃芩芒硝微冷飲二劑瀉下宿糞死蛔六條麻疹乃發次用荊芥銀花湯加玄參黃芩黃柏微溫飲之三劑而愈一方原行次子傷寒發熱咳嗽煩悶腹中大痛麻疹現而復隱喉啞失音六脈弦緊放乳上指臂痧二十餘針未愈用射干兜苓湯減甘菊花粉加石膏桃仁紅花大黃二劑微冷飲之下宿糞死蛔三條麻疹始透復放腿彎痧腹痛餘症俱瘳傷寒黃癍兼痧讀傷寒書有發黃發癍余以為有痧焉者蓋發黃發癍皆即傷寒現症也或中穢氣或因暑氣或感時行不正之氣遂兼痧脹即傷寒兼痧之說也治驗一孔叔元傷寒傳胃腑口渴壯熱頭汗發黃舌胎芒刺腹脹迷悶舌短聲重氣急發喘余見脈左寸關伏餘脈弦緊曰痧毒阻於筋脈脈氣不宣故微伏而弦緊兼之胃腑熱極痧毒乘之一飲熱湯熱物痧毒橫行攻擊臟腑故見此等惡症先放頭頂痧一針次放指頭痧二十餘針及乳上痧二針迷悶即松付以烏藥順氣湯加石膏黃連大黃桃仁二劑微冷服之頭汗舌胎始退餘症漸解復放指上痧付枳實大黃湯減槐花加紅花芒硝二劑溫服乃瘳一孫彥衢內室壯熱發黃頭汗如雨大渴唇焦左脈弦緊右脈沉微放手臂腿彎上下痧四十餘針流出紫黑毒血未愈付細辛大黃丸沉香郁金散微冷湯下用桃仁紅花湯加牛膝石斛二劑微溫飲之乃痊一梁鍾素傷寒六日壯熱發癍大渴昏沉余見脈洪大無倫兩太陽青筋刺痧三針放腿彎痧五針出毒血未愈用荊芥紅花湯合清涼至寶飲加石膏稍冷送下四劑而愈一湯茂珍次女八月傷寒日晡壯熱口渴發癍頭痛如破聲重耳聾吐蛔二條迷悶幾死兩寸脈微無力兩關弦細兩尺左滑右緊放腿彎痧三針略鬆用清涼至寶飲加黃芩牛膝石膏桃仁澤蘭烏藥枳殼微冷飲之不應復放痧用熟大黃三錢細茶一撮煎服而痊痧類陰症痧症類傷寒不獨類傷寒傳經熱症觀諸痧變脈侯更有不似陽而似陰者幾令人反疑為直中三陰真寒症痧毒入深也稍用熱藥熱飲便不可救療治驗一章晉卿發熱沉重口渴兩顴紅赤唇燥舌苔兩手震動舉家驚惶脈沉微無力時有用乾薑肉桂治之有用附子治之此則認脈為陰而作傷寒三陰真寒症治之也服之危篤延餘四子端英診之知其脈症不合看腿彎痧筋放四針流紫黑毒血付石膏黃連黃芩兼活血順氣之藥稍熱飲之一劑而鬆再劑而安一楊馥音發熱嘔吐瀉泄手足蜷攣怕聞響聲頭汗如雨有指為虛極而然用大劑人參補之反加昏悶余按其脈沉細無力視其面有戴陽之色迨詢所飲見熱而拒遇冷則喜余思此必內有痧症熱毒故脈症若斯扶看腿彎痧筋二條放之流紫黑毒血如注用桃仁紅花湯加角刺牛膝微溫服四劑用清涼至寶飲加黃芩溫飲二劑而痊一何心祝身不發熱咳嗽吐瀉蜷臥沉重手足俱冷昏迷不醒喉中痰聲不絕醫者四人咸云床褥不謹內中陰寒用人參黃耆附子乾薑等藥服之病日增余按脈徐疾不常時有歇指探其氣口熱如爐看其舌有黃黑苔芒刺余曰此非直中陰經真寒症也其族兄爭之不已余曰焉有陰症而舌胎芒刺口熱如爐者乎況服參耆姜附已有明徵若必欲以陰治請辭其家人固求余先用陰陽水二碗飲之遂覺稍醒其弟二人竭力扶起放腿彎痧六針付以射干兜苓湯去甘菊加烏藥玄明粉檳榔卜子二劑稍冷飲之後減玄明粉加童便六服而痊呃逆痧呃逆俗名冷呃有寒有熱有虛有實有因痰火而發有因血鬱而成有因食阻而得有因氣阻而生有因病重發喘為呃謂之喘呃若一概認呃為冷以丁香柿蒂主之謬矣故老弱氣虛犯呃非參不補若虛極陰寒犯呃非薑桂附子不溫即此冷呃治之亦異而況痧脹為呃有痰火血鬱之分有食阻氣阻之異有病重喘呃之凶苟非細辨受病之原用藥稍或不妥非惟不效勢必呃死是用明痧呃之害焉治驗一徐望舒傷寒變瘧呃逆三日夜兩寸脈微餘脈緊滑余曰呃逆脈異病後兼痧也閱腿彎上下痧筋放四針紫黑血流不愈用細辛大黃丸清茶稍冷服之付清涼至寶飲微冷下而痊一王彥甫內室產後月餘發熱呃逆腹脹沉重其長子謂余曰老母產後傷寒六日沉重異常忽發冷呃將若何余診之六脈弦細而疾口渴畏熱飲痧症顯然放臂痧三針血流如注又放指上痧三十餘針用蘇木散並付桃仁紅花湯加山楂卜子二劑俱微溫飲之乃愈一孫靖公六月心煩呃逆兩寸關俱細澀而數且喜冷飲余曰痧脈已現痧症昭然刮痧放痧不愈用清涼至寶飲減細辛加香薷黃連童便食鹽微冷服遂愈盤腸痧痧毒肆行盤轉腸胃雖不痛不疼苦楚萬狀命在須臾此緊痧之症也治驗一張方曦內人十一月間胸腹中氣不舒暢惟是盤旋絞絞於胸腹腸胃中叫喊幾死將及半日時晚延余診其脈洪大無倫令其僕婦放指頭痧二十餘針用救苦丹沉香丸清茶稍冷飲之未愈付防風勝金湯加桃仁紅花治之而痊一汪履公弟三月飯後驟然叫喊腹中絞絞述悶無極六脈俱伏放腿彎痧六針紫黑毒血出如湧泉未愈用鹽湯冷飲二大碗吐去新食付清氣化痰飲稍冷服而愈一盛玉鉉炎月旁晚胸腹述悶苦不可言自謂死期在即舉客驚駭延余右三部脈伏左三部脈洪大無倫放指頭痧三十餘針未愈用礬湯冷飲二碗吐去新食付蒲黃飲減薑黃加卜子微冷服而痊自汗盜汗驚惶痧自汗陽虧盜汗陰弱聞聲而驚震遇響而惶懼者虛極之候若因痧有是症者固表固本在所大忌務宜辨之治驗一陳肅達內人本質素虛幾遇病非人參不效四月間心胸煩悶汗流不絕聞聲驚恐初病延余脈未顯難辨余聞素虛雖不敢用參付平劑不應延他醫付藥加參補之疾益甚復拉余按脈不見沉微反見浮洪緊大余曰痧也三子叔楊為母放痧畢余用寶花散沉香阿魏丸微冷茶飲之漸安肅達恐虛實未明停藥二日後用歸身山藥茯苓麥冬沙參丹皮四劑而愈一潘中黃心胸煩悶睡即盜汗不已先將腿彎痧筋放之即發暈不愈越六日延余按其脈不與症合余曰痧毒幸放故無大害其發暈者適遇痧氣衝心是以得暈非放痧之害也復為放指上痧三十餘針未愈用寶花散微冷飲之用獨活紅花湯加卜子調黑糖治之而痊一祝公庵次子發熱頭疼自汗如油痰喘如鋸時覺昏沉有以牛黃抱龍丸生薑湯治之更重延余診之脈上盛而虛放乳邊痧三針腿彎上下痧六針未愈付桃仁紅花湯加牛膝石斛細茶微溫飲之三劑而安一石敬村女口渴盜汗腹脹如臌有治之不應余按脈弦細無力放指頭痧二十餘針用蘇木散合寶花散砂仁湯微溫飲之付蒲黃飲加角刺卜子溫飲四劑又用清涼至寶飲二劑而痊痧類三瘧瘧有一日一發有間日一發有三日一發邪氣所湊感受各有淺深若三日一發者所感獨深但痧毒乘之陰受其禍即有不測焉能識之邇於全書所記外見有痧類三瘧者故續編之以彰其害焉治驗一陸淑韓祖年近七旬八月患瘧間二日一發寒熱甚重心胸煩悶將及半月診之左脈微澀余曰不意斯疾亦有痧焉刺腿彎痧三針流血紫黑用寶花散沉香丸清茶微冷飲之付防風散痧湯加連翹柴胡橘紅膽星微冷服二劑六日乃痊一懷惟貞患三瘧半年忽煩悶沉重坐臥不安六脈俱伏余曰此三瘧兼痧者也刺腿彎痧二針流紫黑毒血用寶花散清茶微冷飲之遂松後不服藥漸痊咽喉諸症兼痧咽喉諸疾亦有兼痧之症與若云咽喉從古無兼痧論試思古人治咽喉十八症有刺少商穴法此何異乎夫少商穴屬太陰肺經在手指爪角內側刺之出血以瀉其毒治惟一經尚有其效若乃兼痧凡經絡所傷或上或下隨經刺放以拔痧毒乃反莫救於咽喉乎余竊謂咽喉兼痧痧毒內發病必難愈若按脈看筋能先治痧令痧毒一去然後內服藥餌外用吹敷可也治驗一余長孫犯喉疳脈虛而微數閱腿彎痧筋放三針流紫黑毒血吹冰硼散用清涼至寶飲減細辛加射干連翹枳殼牛膝貝母微溫飲之而愈一陸思湖犯喉癬危急醫治不應余診之脈弦而緊右寸脈伏閱有痧筋刺十餘針紫黑毒血流如湧泉吹冰硼散用清涼至寶飲減細辛加山豆根連翹菊葉飲之而痊一繆瑞吾子犯喉痹疼痛脈兩寸俱伏余曰症與脈異殆必有痧若止治喉痹恐難即愈不信辭之他醫調治痛益甚復延余放指頭痧三十餘針口噙冰梅治其痰涎用清涼至寶飲減細辛加射干連翹微冷飲之即愈一潘象黃鄰人犯咽喉腫大看有痧筋云此宜刺放然後醫治則愈嘗對余談及余雖不臨症治之然即此一人知天下犯咽喉腫大必有同也故並記之口舌兼痧口舌有疾適因感觸犯痧痧症雖發在後治之不容或緩即使口舌症凶痧脹較之尤急斷不可先口舌而後痧脹也治驗一翁珍碩舌下起重舌苦難盡述有以少陰君火治之不應余按其脈左寸沉微右關無力若據脈宜補據症宜涼取痧筋驗之放腿彎痧十餘針皆紫黑毒血求余立方余曰向所服者俱清涼之味宜少加川連所吹者俱引涎之物宜多加冰片即而奏效於所疾也但服藥不當溫飲略覺微溫足矣三日而痊一聶敏躬口疳作爛吹藥益甚放痧不愈求余右脈微緩左脈沉伏付清涼至寶飲減細辛加石膏牛膝烏藥枳殼青皮稍冷飲之用冰硼散加膽礬兒茶吹之類瘋痧瘋有真瘋有類瘋不辨其實概將花蛇等藥攻之誤矣余見痧脹多變更有類乎瘋者故正其名日類瘋痧治驗一範嗣曕咳嗽氣急兩顴唇口鮮紅有以不足症藥治之不應余以痧療之而痊迨半年後面顏上忽變出圓片紅色高起外科視之認作大瘋治余按脈微而緩曰痧也閱痧筋放腿彎下三針紫黑色毒血成流又放指頭痧二十餘針用沉香郁金散清茶冷飲之付如聖散加紅花青皮調黑糖湯微冷飲之而愈黃氣病兼痧腸胃內熱積滯氣阻成黃氣病往往有兼痧者非先治痧則黃氣病終不能治也治驗一驤武弟婦犯黃氣病面色萎黃腹脹如臌腿足俱腫六脈微澀令僕婦為之放痧三十餘針俱紫黑色毒血用沉香郁金散清涼至寶飲加青皮烏藥檳榔山楂卜子牛膝俱稍冷服腹脹始松後惟用黃氣病本藥微冷飲四劑而痊一蒯香年犯黃氣病熱渴唇烈面黃腹脹手足俱腫食即作瀉及按其脈徐疾不常緣視腿彎上下痧筋刺十餘針毒血成流用阿魏丸砂仁湯微冷飲之脹氣遂減余即以治黃氣病本藥治之六劑而痊一董臨橋腹脹如鼓兩足微腫飲食不進面色干黃諸藥不應求余治之脈不洪數反沉遲刺指臂三十餘針胸腹遂爽即用治黃氣病藥稍冷飲四劑而愈翻胃噎膈痧病有翻胃兼痧有痧變翻胃有噎膈兼痧有痧變噎膈其痧似慢日漸凶暴宜細辨之治驗一包世球年六旬余患翻胃症食即心痛嘔吐不止余按其脈六部洪緊有力乃閱痧筋放手臂腿上痧二十餘針付以烏藥順氣湯及降香桃花散俱微溫服四日而痊一蔡愛山胸中飽悶欲食不食食即胃脘不寧苦楚萬狀余診之後三部脈微澀放腿彎痧二十餘針略鬆日服蘇木散微溫酒下二錢六日而愈筋骨疼痛痧筋骨疼痛多延蔓終身治此者或風或濕或氣阻血凝或流痰流火如此而已然有效有不效或為痧暗相纏令人莫識此痧甚慢不可不知也治驗一董季連筋骨疼痛臥床二年諸藥不應余診之右脈微弦左脈沉細閱痧筋放之血流紫黑用圓紅散微溫湯飲之付蒲黃飲加五靈脂角刺溫服六劑而痊一郝文仔筋骨疼痛步履艱難吐痰氣急左脈微芤右脈弦緊放腿彎痧紫黑血三針用必勝湯加角刺微溫飲之漸愈鬼箭痧世俗傳鬼箭之說有針挑火焠油發艾桃揩諸法不敢服藥疑真有鬼禍非也識者辨之謂鬼箭是風神箭是寒床箭是濕痛而轉動者氣與痰也痛而難轉動者血也各有方治然中亦有雜痧者先治痧毒後除餘症亦箭亦須知也治驗一曹叔恆遍身走注疼痛不能展動或曰此鬼箭也以油發艾葉揩之以燈心蘸菜油點火焠之不應適見余自述其病診之脈左虛右實放痧三針流紫黑血用桃仁紅花湯加穿山甲天蟲香附微溫服漸痊一鍾洪武內室腰背疼痛臥床不起有以為鬼箭之病從痛處挑筋十餘針不愈延余脈徐疾不常曰瘀也令其婢刮而且放刺腿彎痧二十餘針流紫黑毒血用紅花湯加穿山甲澤蘭劉寄奴四劑微溫服乃痊久瀉肉瘦痧瀉久則肉瘦或健脾或燥濕或消積或滲水或補命門火或平肝木氣治瀉之藥不過如是若慢痧之變久瀉肉瘦病原不同但宜治痧則瀉自止矣治驗一姚公亶潘婢久瀉不已不思米食日漸尪瘦大肉漸脫脈反有力放痧二十餘針紫黑毒血成流付寶花散阿魏丸俱稍冷飲之即愈一莫電云久瀉不已骨瘦如柴唇紅口渴粥食不進胸中飽悶脈反微伏放腿彎痧四針毒血紫黑流出如花用沉香丸清茶稍冷飲之付稜術湯加銀花澤蘭治之而愈一巢茂公次子久瀉肉削咳嗽不已夜臥盜汗目白微紅余診之脈寸伏關弦放腿彎上下痧三針復刮痧畢付清涼至寶飲加山楂卜子銀花微冷飲之而痊婦人隱疾痧婦人幽隱疾多有兼痧最難識認惟在診脈之人指下明白乃無差誤爾治驗一婦人患血淋三月矣頭面腿足俱腫六脈洪實緊盛余意血淋熱症也洪實緊盛熱脈也何乃頭面腿足驟俱腫殆其痧乎令其家人放腿彎痧二十餘針多用清涼解毒之劑治之而痊一婦人患血崩其家人曰痧也引他婦閱之果有痧筋放之用養血和中之劑治之而愈腳氣痧腳氣有因乎痧者此慢痧纏綿腿足或半年一年或五年十年其疾僅在腿足上身氣血流通脈往往不現但兩尺脈微數有力而已幾遇雜病切忌升提以防痧若不知治痧毒肆行腿足紅腫痧筋一散無從可放所以四肢痧難治治驗一老年人苦足底燥烈以為氣血衰微所致不用藥治之閱有痧筋放四針毒氣散行腿足遂腫次日放痧四十餘針其腫漸平三日又放痧四十餘針足底漸滋潤惟是日當放痧不服藥而愈一王姓者患腳氣腿足俱腫看有痧筋懼痛不治緣世人犯此者多故記之耳痛痧耳孔甚微腫痛最苦若兼痧其勢必盛治惟以痧為先耳痛亦有驗焉治驗一鄭惟和左耳出膿腫痛連左太陽及肩脅俱痛右脈沉微左關細澀看痧筋刺左腿彎十餘針其痛遂減內用如聖散稍冷飲之外用羊糞一粒綿裹塞耳即愈一翁左溪右耳腫痛日夜不寧脈微而緊放腿彎痧十二針血流紫黑用清涼至寶飲減細辛加牛膝石斛稍冷飲之而痊手臂痛痧手臂有痧攻及臟腑者為緊痧不攻臟腑者為慢痧慢痧之症惟刺手臂緊痧之症兼服痧劑治驗一余右臂筋中作痛閱有痧筋刺三針出毒血臂痛遂愈一高松筠左臂疼痛醫治不應閱臂上痧筋刺四針出毒血不藥而愈腫毒夾痧辨腫毒陽者為癰陰者為疽往往有夾痧而發設使不先理痧單去毒亦不效也治驗一王姓者腰腎間白腫如盤臥不轉側痛苦萬狀將及二月余按脈弦緊而或伏曰夾痧之毒也先放其痧後理其毒迨半月出微膿而愈一人大腿紅腫如瓜先放痧而治之愈一人左腎囊紅腫獨大先放痧而治之愈一人小腹痛極生毒平腫白色先放痧而治之愈一人右臂生黑疔先放痧而治之愈一人生右腎疽大如小盤墨黑其孔數十不知痛癢發熱不食閱左腿有痧筋放之即身涼進食四日而痊一人生懸癰兼患雙橫痃引一善放痧者於尻尾骨上放六針腿彎放七針而愈一人生鵝掌瘋放痧而愈一人大麻瘋手足拳曲其形真可憐也閱有痧筋故記之刺蝥瘟痧時有壯熱煩悶遍身痛如刺蝥所傷鄉俗相傳名為刺蝥瘟焉以痧治之可全也治驗一林悅溪犯時疫瘟疾壯熱口渴胸腹迷悶以手撫摩之即如刺蝥傷痛遍體皆然放腿彎痧二十餘針毒血成流用穿山甲天蟲角刺加活血順氣之藥稍冷飲之而痊地葡瘟痧時有北疾村俗相傳名為地葡瘟者閱之亦有痧也治在前遍身腫脹痧條內故不更載治驗但恐時人或誤故復記之痧變發頤痧者凶疾也痧而發頤毒氣上攻尤凶之甚也宜急治之遲則難救治驗一汪云文壯熱目赤口渴煩悶譫語神昏左脈沉微右脈歇指痧也先服陰陽水一碗神昏少清譫語稍定然後扶起放痧訖外用赤豆水搗敷圍內吹冰硼散付以穿山甲天蟲角刺射干山豆根土貝母連翹烏藥枳殼川連牛膝微冷飲之頤遂出膿些須四日而愈急救逆痘要法痘有順有險有逆險者尤可回生逆者斷難療治此不易之論也然余觀嬰兒出痘暗犯兼痧其痘未有不逆故兼痧之痘或難放標或標而不分顆不起發或當起發分顆而反隱或發癍疹或變焦黑或見飛漿或生血泡或肉腫痘不腫或下身先發而臉額不起頂不行漿或瑣屑細密色澤晦暗或一片如咽脂色種種逆症往往因痧毒惡血壅阻以致殞命愚嘗先放其痧隨宜用藥則毒血一行壅阻俱散逆者可轉而為順難標者即標難起者即起當漿者即漿無奈世人以痘不可放痧誤事不少不知逆痘難療更無生路惟茲一法可救但恐痧助痘毒內攻甚速遲難挽回若逆痘始現有痧即放治之甚易凡遇逆痘急宜鑑諸治驗一金權可女四歲十一月間痘五朝放標至足面痘猶細如芥子隱隱不發其腰下痘反有水珠色真逆痘也閱左腿彎有痧筋放一針手指上痧放十五針俱紫黑毒血面痘立時紅活起發余看痧氣已絕惟用十神解毒湯減大腹皮加天蟲大力子山楂青皮一劑次日面有行漿之勢惟用養血托漿清涼解毒之藥五劑痘即如期灌膿收靨而愈一金權可子三歲十二月間痘六朝左腰痘密有蟢窠形色如水珠其面臉痘紫赤滿頂不發服酒漿桑蟲一條反變兩顴一片如脂脂色不分顆粒左額見飛漿一粒亦逆痘也余為放指上痧二十餘針痘即分顆紅活余惟用痧痘可兼治之藥一劑治之次日痘即行漿後惟用治痘常藥遂灌膿收靨而痊一汪扶搖子八歲六月間痘五朝面上肉腫痘不腫他醫謝事延余閱腿彎有痧筋放四針紫黑毒血成流用寶花散兼圓紅散微溫湯服次日痘即起脹後惟用大補氣血藥助灌膿收靨而愈一褚雋甫女十二歲八月間痘四朝遍身紫癍他醫莫治延余閱指臂上痧筋放二十餘針用大黃丸稍冷湯飲之癍退痘起後惟用清涼解毒之藥即如期灌漿收靨乃瘳一詹福先子六歲九月間痘四朝大渴舌心有黃黑胎腰腹大痛面部痘色焦紫過頂不發延余閱有痧筋放腿彎指頭痧二十餘針痛不止用細辛大黃丸清茶微冷飲飲之痛稍減付必勝湯加川連石膏一劑微溫飲之痛止胎退痘漸起脹尤大便不通去川連石膏日服此湯灌膿收靨便通而愈癇症兼痧癇痼疾也患此者雖不即斃然往往勿獲長壽治惟疏風消痰清熱或溫下之而已不知亦有痧焉者宜辨之治驗一朱建溪婢犯羊癇瘋三年矣余診之六脈緊伏不勻閱痧筋放之付以沉香滾痰丸微溫湯飲之遂愈永不再發一盛昭先次子患豬癇六年脈伏緊而數閱痧筋放之脈遂平付沉香滾痰丸微溫湯飲之亦不再發麻木酸癢痧麻木酸癢古人論治宜遵余不更述但痧症變幻時亦有之治驗一翁尚景遍身麻木腿膝酸癢異常脈微而細放腿足痧四十餘針指頭痧六針未愈付圓紅散微溫湯服之用當歸金銀花連翹秦艽穿山甲末殭蠶角刺紅花二劑如前服而痊頭虛足腫痧世俗相傳有云男怕頭虛女怕腳腫謂醫治之難療也獨是頭虛之症世豈無有消風熱而得愈者乎不知腫因風熱乃可治效若不因風熱而因痧者奚可更用發散升提之味耶惟是頭面虛腫實因痧毒上攻三陽先宜放刮後用清涼引下之劑治之應無不愈無令更變出凶險別病也至若腳腫之疾婦人犯此不數年而小腿腫加之大腿亦腫漸漸入腹睡即腿足不腫內發脹悶若當起坐行動胸腹乃松足腿復腫如此日復一日更不數年勢必小便不利大便亦阻即成真臌愚按此因濕毒之氣蒸淫於足傷其血分變為慢痧不由鼻吸而入故吃熱湯熱物俱無驟害脈亦有現有不現及閱痧筋或在腿或在足面或在足兩旁必多刺數次出毒血為要如不愈當內服藥餌乎其氣血為主大忌升發燥熱之品恐毒氣上騰也若此之痧有患五六年而斃有患十餘年而斃有患二十餘年而斃世鮮識者受苦甚多不可不憫余故特為之著焉治驗一殳茂甫驟患頭面紅腫心胸煩悶口渴唇焦六脈俱伏放巔頂痧及手指腿彎痧二十餘針不愈用清涼至寶飲減細辛加石膏知母茜草稍冷飲之三服而痊一方士彥患頭面漸腫眉發盡落已二年矣脈洪數而緊盛放指臂痧及兩太陽痧二十餘針腿彎痧四針服清涼至寶飲減薄荷細辛加穿山甲天蟲烏藥續斷桑寄生紅花歸身微溫飲之十服而痊一秦馥生內室素患腳腫及腿漸升於腹夜苦心中飽悶飲食不寧日間行動足腿復腫十餘年矣診脈細數令其家人為之數放足面及兩旁痧用川楝子金銀花木通澤瀉檳榔澤蘭青皮枳殼烏藥連翹溫飲八服遂愈一張書瞻病後足腫無力少進飲食兩尺脈伏閱足面痧及足旁痧腿彎痧放之用川楝子檳榔金銀花連翹白茯苓澤瀉歸身續斷紅花白蒺藜烏藥而痊黃疸痧黃疸之症亦痼疾也不用鮮草頭方之迅利則不效然亦有效有不效者詎黃疸有必不可治者耶蓋黃疸因內有實熱而發若痧毒所變亦有然者務宜先施刮放後取黃疸方選擇而用自可得痊治驗一夏月溪目睛爪甲小便皆黃四肢上下遍體黃腫服他醫諸方不愈余診之脈微數而緊若據脈宜補據症宜清不可中治乃閱痧筋放之漸鬆用麥門冬四兩豬板油四兩煎服而痊一婦人黃疸放痧後用草頭方搗汁酒沖服二次而痊小兒夜啼痧小兒暮夜啼哭不止父母愛之嘗百計撫摩憂疑無極曾不得立時安靜為憾不知胸腹疼痛故爾啼哭若曰小兒無痧吾不信也治驗一朱廣函女二歲時至夜半忽然啼哭叫跳不住意其胸腹作痛將刷子蘸香油刮之痧起不藥而愈一汪洪甫子二歲夜深啼哭迨至清晨不歇延餘四子端英往視其左腿彎有痧筋放一針流紫黑毒血用防風勝金湯多加麥芽稍冷飲之而安驚風痰熱痧小兒犯此惟用疏風豁痰定驚之品其常也然竟有疏風而熱不除豁痰而痰不消定驚而驚益甚者得毋審其病原有未當乎余嘗見此審其症候稍雜閱有痧焉即以痧症治之甚效治驗一岳瑞升幼子發熱面赤痰喘不已兩目上視困重沉沉他醫莫治延余脈緊而數先用圓紅散稍冷湯飲之令其家人刮痧痧起未愈用和脾宣化飲研細辛大黃丸微冷飲之遂安一高子瞻女一歲痰嗽身熱手足抽搐昏迷不醒端英子往視虎口脈不現六脈俱伏閱腿彎痧放一針紫黑毒血流出用救苦丹清茶稍冷飲之未愈又用三香散微冷湯下而痊死症痧詢治痧之法凡人犯死症亦有可救者乎曰有余且無論百病死症多有可救之實惟據傷寒集中有云赤斑五死一生黑斑十死一生陽症見陰脈死陰陽毒過六七日不治兩感傷寒者死汗後不為汗衰謂之陰陽交者死不得汗者死發熱脈疾躁狂言不能食謂之三死咳逆不止者死臟躁者死厥陰舌卷囊縮者死脈代者死少陰吐利煩躁四逆者死發熱至七八日膚冷而躁無時暫安曰臟厥不治少陽與陽明合必下利脈長大而弦名曰負負者死陰陽易病頭重眼花四肢拘急小腹絞痛手足攣痛者死脈陰陽俱虛熱不止者死傷寒七八日以上大發熱者難治溲便遺失者死循衣摸床邪熱內結脈弦澀者死喘而不休者死柔汗發黃者死唇吻反青者死環口黎黑者死鼻如煙煤者死直視搖頭者死此等惡症往往兼痧以前治驗歷歷有據然余所救者甚多難以悉數但人犯死症如落深淵利在見之早救之急爾羊毛瘟痧此痧言遠先生道之甚悉所以垂救世人多矣余實未見不敢妄論近又聞丹箴袁兄所述自北方來親見此症胸前生羊毛數莖北人又有用銅錢置病所以艾火燒錢上外將瓦罐或竹罐盒之即時拔出汗水而愈北人名為打火罐並能治痧痛是也抑又聞北方人用手推背上二筋撮起掐緊一時許亦能治痧痛此二法余雖未經驗若為之想亦有益無損故並志之以為窮荒僻野無醫療治者一生路焉痧脹破迷論痧中禁忌余慮不知痧誤犯之尤慮知痧罔識所忌譬若昏夜迷途高低莫辨從步於岩谷間鮮不顛仆者矣蓋痧受病與雜症不同見端與雜症相類病家不信以雜症治之勿顧痧中禁忌勢必日甚一日病入膏肓即有進言刮放一試焉無及矣則受迷於痧脹之始者此其一亦有始即知痧稍用刮放便謂業既治痧當用別藥幸而不犯痧禁或可收功若痧氣未絕一犯所忌愈服愈危身命難保乃曰非因痧脹之故則受迷於痧脹之終者此其一更有患痧不識用別藥不效因而僅用刮放不佐以治痧之劑或僅投一二劑復投別症之藥致痧患復發茫然不覺乃曰治痧無效不足信也不知治痧用藥稍或不合勢必痧毒內攻而斃則始終受迷於痧脹之害者又其一更不特如是己也或痧症有時汗出如油誤服酸斂固表之味或痧症有時寒熱無汗誤服升提溫散之方或痧症有時足冷過膝誤服附子吳茱薑桂之品或痧症有時上吐下瀉誤服香燥澀滯之類或痧症有時惡寒畏冷誤服姜椒辛辣之物更有痧症變為脈虛誤用溫補之藥痧症變為脈旺誤用冰寒之藥或痧症變為怪脈雖不皆生然誤認必死棄而不救而且痧症嘗似氣虛誤用參耆苓朮以補氣嘗似血虛誤用熟地何首烏以補血而且痧多死症凶險非常不復細審病源以為別症將斃而且痧症略鬆食物太早因而痧物相裹結於心胸難以解散而且痧症未絕痧毒尚仔驟飲熱湯熱酒遂致痧症復發凶危莫遏每有變在頃刻悔之無及此等受迷皆余所目擊而心傷者也若乃有見痧諱言痧犯痧惡言痧雖死於痧勿知為痧之害者其天下之所限乎余固不得而強之即有擯刮痧放痧治痧之方法者余亦不得而強之也嘗觀醫林多士業擅岐黃深通古籍者動輒援引內經諄諄不已竟不知黃帝始制九針之法以療民病多刺少藥即如內經有云諸瘧而脈不見刺十指間出血血去必已先視身之赤如小豆者盡取之又云先其發時如食頃而刺之一刺則衰二刺則知三刺則已不已刺舌下兩脈出血不已刺郄中即委中盛經出血又刺項以下挾脊者必已如先頭痛及重者先刺頭上及兩額兩眉間出血先項背痛者先刺之先腰脊痛者先刺郄中出血先手臂痛者先刺手少陰陽明十指間先足脛痠痛者先刺足陽明十指間出血又如腰痛引項脊尻背如重狀刺其郄中太陽正經出血刺解脈在膝筋肉分間郄外廉之橫脈出血血變而止解脈令人腰痛如引帶如折腰狀善恐刺解脈在郄中結絡如黍米刺之血射以黑見赤血而已經載煌煌垂訓萬古正後人之所當祖習者也故痧多變余不能盡述凡在爾所不信者試於清夜思之苟遇斯疾偶爾心迷當刺不刺當藥不藥或誤入或誤己彼此不異諒有同心慎之慎之
