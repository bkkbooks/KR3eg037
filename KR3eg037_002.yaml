body:
  text: 卷之上痧症發蒙論夫君子生於斯世不屑為天下無所用之人則必求為天下所必需之人故君子不為良相則為良醫蓋良相濟世良醫濟生其所以行我心之不忍者事有相符而道有相類也余於傷寒痘疹驚風虐痢與夫胎前産後等症俱所潛心姑不具贅獨是痧之一症緩者或可遲延急者命懸頃刻在病家必當誠心請救在醫者必當急為赴援非若他症之可以遷延時日姑且慢為調治也邇來四方疫氣時行即今醜寅年間痧因而發鄉村城市之中俱見有此等症或為暗痧或為悶痧或為痧痛或為落弓痧噤口痧撲鵝痧角弓痧盤腸痧或又因傷寒虐痢與夫胎前産後等症而痧兼發甚至闔門被禍鄰里相傳不可重悼余嘗遇此等症臨危急救難以屈指其治之大略有三法焉如痧在肌膚者刮之而愈痧在血肉者放之而愈此二者皆其痧之淺焉者也雖重亦輕若夫痧之深而重者脹塞腸胃壅阻經絡直攻乎少陰心君非懸命於斯須即將危於旦夕扶之不起呼之不應即欲刮之放之而痧脹之極已難於刮放矣嗚呼病瀕於死誰不傷心痧症至此信乎非藥不能救醒非藥莫能回生則刮放之外又必用藥以濟之然後三法兼備救生而生全庶乎斯人之得有其命也其如世有刮痧放痧之人僅有刮放之能而已余俱非所長也故痧有放之不出刮之不起便云凶而且放痧數次不愈刮痧數次不痊便聽命於天而垂斃者往往皆然若夫業醫諸友責在救人推其心豈非當世之所謂君子與然其間或有云諸書不載痧名滿洲因而謂非藥可療不知載籍之內原有云絞腸痧者有云乾霍亂者有云青筋者有云白虎症者有云中惡者此皆痧之見於諸書但略而不詳未有專家然不見有云是宜絶藥誠彰明較著而可視也況痧有為真頭痛朝發夕死夕發旦死寄於頭痛之條痧有為真心痛亦朝發夕死夕發旦死寄於真心痛之例此二症者雖屬不治若知其原於痧者而療之亦可挽回況痧有為頭面腫脹一似大頭瘟痧有為咽喉鎖悶一似急喉風痧有為眩暈昏悶少頃云殂一似中風中暑痧有為喑啞沉迷身體重痛一似驚魂落魄此皆其勢在危急刮放不急者非藥將何以救之乎而況痧有頭痛寒熱類於傷寒咳嗽煩悶類於傷風與夫因瘧而兼痧因痧而化瘧或又痢以痧發痧緣痢生而痧症百出傳變多端更不特如此而已也諸如鼻紅吐紅瀉血便血由痧而得者有之更有大腫大毒流火流痰由而生者有之或又有胎前産後氣鬱食鬱血鬱火鬱而痧之兼發者有之或又有痧而手腫足腫手痛足痛連及遍身不能轉側者有之或又有痧而胸脅肚腹結成痧塊一似痞悶一似結胸者有之或又有痧而吐蛔瀉蛔食結積結血結者有之或又有痧而心痛脅痛腹痛腰痛盤腸吊痛遍身疼痛幾不能生者有之況痧嘗有內症所傷將瀕於死者男子犯此一似蓄血而血分之治法不同女子犯此一似倒經而氣分之治法亦異蓋痧之為病種種不一難以枚舉豫特指其大略而明其最要者須看脈之真假認症之的確然後投劑必當用藥無虛若痧在肌膚當刮即刮痧在血肉當放即放痧在腸胃經絡與肝腎脾三陰當藥即藥若痧氣肆行不拘表裡傳變皆周當三法兼用務在救人於將危而回生於將死余之治此等症隨處救人確有奇驗竊恐前人無論難啓後賢因著為集仍不敢祕以公諸世庶幾其有以行我心之不忍而幸不為斯世無所用之人歟玉衡要語痧分表裡辨痧之初發必從外感感於肌表人不自知則入於半表半里故胸中作悶或作嘔吐而腹痛生焉此可以刮痧而愈不愈用荊芥湯藿香湯之類而選用之痧感於半表半裡人不自知則入於裡故欲吐不吐欲瀉不瀉痧毒衝心則心胸大痛痧毒攻腹則盤腸吊痛此可以放痧而愈不愈用陳皮紫朴湯稜術湯之類而選用之痧中於里人不自知則痧氣壅阻惡毒逆攻心膂立時發暈即欲刮痧而痧不起即欲放痧而扶之不起必不得放即扶起放之而發暈之時氣血不流放之亦無紫黑毒血流出即有些須亦不能多略見紫黑血點而已此痧毒入深大凶之兆斯時病家求救甚切方可用藥余但審脈辨證的系風寒暑濕氣血食積痰飲何因而施治令其蘇醒氣血流動然後扶起放痧漸以調治如不醒即擇牛黃丸三香丸救苦丹之類以救之如此重症必需醫者慈心大發立時連進湯丸方能有救遲則必死治痧宜看涼熱痧犯太陽則頭痛發熱犯少陽則耳旁腫脹寒熱往來犯陽明則面目如火但熱而不寒犯太陰則腹痛犯厥陰則少腹痛或胸脅痛犯少陰則腰痛而皆身涼犯乎肺則咳嗽痰喘微熱甚則鼻衄犯乎心則心痛或心脹其頭額冷汗如珠而身或熱或涼犯乎膀胱則小便溺血甚則身熱犯乎大腸則痢下膿血重則嘔吐身熱犯乎肝則沉重不能轉側晡熱內熱甚則吐血犯乎三焦則熱毒內攻上則口渴下則便結治痧當辨身涼身熱蓋身涼者內熱者宜攻其里表熱者宜透其肌唇舌辨痧者急症也若昏迷不醒口不能言其心胸煩悶一種難過之苦將何以辨之治宜先觀其唇舌色黑者凶色黃者重色淡紅者較之略輕蓋黃色而知內熱黑色而知熱極淡紅色雖熱用藥不可太冷又要看有苔無苔其症始有治法矣大小便宜通痧症危急大便不通急宜放痧而攻之小便不通宜放痧而分利之咽喉治法痧症危急若犯咽喉則痰喘如鋸先放其痧急用薄荷鼠黏子童便山豆根之類以清之或兼用冰硼散以吹之然後餘症俱從緩治治痧當絶其根痧之為害治之雖愈若一有未除即復肆毒又遍周身如在表者已刮在中者已放而在內者少有未消一吃米飯或熱湯熱酒痧毒即復由內而攻表遂遍周身如在內者已治在中者已放而在表者未刮即復由外而攻內若表裡具盡治矣而在中者未放亦復傳遍表裡如此可畏之極真生死所關非雜病所得而比也故治痧當絶其根痧原論痧症先吐瀉而心腹絞痛者從穢氣痧發者多先心腹絞痛而吐瀉者從暑氣痧發者多心胸昏悶痰涎膠結從傷暑伏熱痧發者多遍身腫脹疼痛難忍四肢不舉舌強不言從寒氣冰伏過時郁為火毒而發痧者多治痧當分經絡腰背巔頂連風府脹痛難忍足太陽膀胱經之痧也兩目紅赤如桃唇乾鼻燥腹中絞痛足陽明胃經之痧也脅肋腫脹痛連兩耳足少陽膽經之痧也腹脹板痛不能屈伸四肢無力瀉泄不已足太陰脾經之痧也心胸吊痛身重難移作腫作脹足厥陰肝經之痧也痛連腰腎小腹脹硬足少陰腎經之痧也咳嗽聲啞氣逆發嗆手太陰肺經之痧也半身疼痛麻木不仁左足不能屈伸者手太陽小腸經之痧也半身脹痛俯仰俱廢右足不能屈伸者手陽明大腸經之痧也病重沉沉昏迷不醒或狂言亂語不省人事手少陰心經之痧也或醒或寐或獨語一二句手厥陰心包絡之痧也胸腹熱脹揭去衣被乾燥無極手少陽三焦之痧也痧與雜症輕重不同痧與雜症往往相兼而發俱當首重治痧兼醫雜症蓋痧症急而雜症緩也惟胎前産後有痧當並重處治蓋胎前宜補痧症宜消産後宜溫痧症宜涼也故用藥治痧必須斟酌治痧三法肌膚痧用油鹽刮之則痧毒不內攻血肉痧看青紫筋刺之則痧毒有所泄腸胃脾肝腎三陰經絡痧治之須辨經絡臟腑在氣在血則痧之攻內者可消可散可驅而絶其病根也痧前禁忌痧忌熱湯熱酒粥湯米食諸物蓋飲熱湯熱酒粥湯則輕者必重重者立斃吃米食諸物恐結成痧塊日久變出奇疾甚難救療如有幸而食消不殞命者不可以此為例也痧後禁忌痧症略鬆胸中覺餓設或驟進飲食即復痧脹立可變重是必忍耐一二日為則乃可萬全痧脹凶症痧有心胸高起如饅䰽者不治背心一點痛者死角弓反張者死腰腎一點痛者死心胸左右有一點痛者不治脅肋痛者不治四肢腫痛者難治鼻如煙煤者死舌卷囊縮者死環口黧黑者死頭汗如珠喘而不休者死昏迷不醒放痧不出服藥不應者死痧塊大痛服藥不應者死痧為百病變症諸凡百病勢極傷人然亦有未即臨危尚可綿延時日而忽然變病遂致傾危不治者何也蓋百病之中有或因病而感夏月暑熱時行之氣有或床第不潔穢惡沖人而兼之平時伏毒深藏一時痧症均可乘隙竊發所貴醫者識竅先治其痧後理其病所謂急則治其標緩則治其本者此類是也醫家當識痧筋痧症輕者脈固如常重者脈必變異若醫家但識其脈不識痧筋勢必據脈用藥而脈已多變則實病變虛虛病變實誠不可恃曷若取脈症不合者認痧筋有無有則據痧用藥無則據脈用藥乃無差誤故余謂醫家當識痧筋放痧有十在頭頂心百會穴在印堂在兩太陽穴在喉中兩傍在舌下兩傍在雙乳在兩手十指頭在兩臂彎在兩足十趾頭在兩腿彎凡痧有青筋紫筋或現於數處或現於一處必須用針刺之先去其毒血然後據痧用藥治其脾肝腎及腸胃經絡痧萬不失一放痧須放盡嘗見人犯痧症延一放痧者放之以為放痧之法止於此矣不知放痧之人固有善於彼者不善於此亦有善於此者不善於彼使病家延一放痧之人略知一二未識其全則血肉之痧有放而未盡者矣苟醫者不識痧筋見其痧之已放而孟浪用藥藥不能治及於血肉之分或痧症復發痧毒肆攻而輕者變重病家不明其故歸咎於醫醫者之名由茲而損豈反不為放痧之人所誤乎故醫家識痧必須令其放盡痧有放刮不盡辨痧毒所發得善放者放之未有不可盡而亦有不盡者何也蓋痧者熱毒也或誤飲熱湯則青筋紫筋反隱而不現即略現青筋紫筋而放之其毒血亦不流並刮痧亦不出熱湯為之害也此當急飲冷水以解之然後可再放而血流再刮而痧出或又有痧毒方發而為食物積滯所阻食積與痧毒凝結於中即放之不盡刮之不出者食物積滯為之害也此當先消食積而再放刮或又有痧毒瘀滯熱極血凝而瘀血不流阻於胸腹故放之刮之有不盡者此當先散瘀血而後放刮或又痧毒方發而兼遇惱怒氣逆怒氣傷肝則愈作脹故痧氣益盛而放刮俱難盡此又當先用破氣之藥以順之而再放刮如此則痧毒皆可漸消也用藥不效凡病用藥得宜未有不效而痧症竟有得宜不效者何也夫痧者熱毒也熱毒用藥宜涼不宜溫宜消不宜補湯劑入口必須帶冷冷則直入腸胃而肌膚血肉之間雖有良劑安能得至乎此治痧者莫先於刮之放之也如刮之放之而肌膚血肉之毒已除然後將腸胃脾肝腎三陰之毒用藥以驅之藥固未有不效者也然亦有刮之放之而藥有不效者是非藥不效也蓋其時雖放而放之或有未盡雖刮而刮之或有未到則是肌膚血肉之毒猶在故即用藥而藥有不效耳若刮已到放已盡而痧症猶在則是痧毒惟在腸胃脾肝腎三陰經絡非藥將何以治之乎用藥必效痧症危極昏迷不醒即扶之不起呼之不應雖欲刮放而不可刮放乃更有用藥以救之而能必其效者何也蓋痧症用藥必須帶冷冷雖未能即周於肌膚血肉之間而昏迷不醒乃痧之熱毒衝於心膈故心不能自主而昏迷若藥帶冷入口即從心膈間順流而下則熱毒之氣在心膈間者隨藥而消故昏者復明迷者復醒即有不醒者乃食積血痰所阻若能攻而下之未有不醒者矣此余治痧所以又用藥而必得其效也用藥大法痧氣壅遏未有不阻塞於中故作痛作脹用荊芥防風之類從表而散用青皮陳皮之類從中而消用枳實大黃之類從大便而下用木通澤瀉之類從小便而行用山楂卜子之類所以治其食之阻用金銀花紅花之類所以治其血之壅用檳榔蓬朮之類所以治其積之滯也痧有實而無虛辨痧者天地間之厲氣也入於氣分則毒中於氣而作腫作脹入於血分則毒中於血而為蓄為瘀凡遇食積痰火氣血即因之阻滯結聚而不散此痧之所以可畏也故人之壯實者有痧脹之症飲熱酒熱湯而變者固然即人之虛弱者有痧脹之症飲熱酒熱湯而變者亦無不然至如人有雜病兼犯痧症是為雜病變端而亦畏夫熱酒熱湯人不知覺遂遭其禍則是痧之發又何論人之虛實乎夫惟人之實者犯之固即以有餘治之而虛者犯之亦當以有餘治之蓋其有餘者非有餘於本原乃有餘於痧毒也論者以為人之實者固可以有餘治之而人之虛者以有餘治之則益虛其虛矣而不知非然也夫人有痧毒如家之遇賊寇也人有虛實如家之有厚薄也假若賊寇操戈已入於室內矣而乃以家之資財之薄也其賊寇可不驅而出之乎吾見家有賊寇必先驅之為是人有痧毒亦無不先驅之為是也故痧發不論虛實驅毒在所當先溫補必於收後此痧之所以有實而無虛也怪病之謂痧方書所載怪病之謂痰此古人之格言也是以中風痰厥昏迷不醒及流痰腫痛具責之痰然有治痰而痰得其治者十中一二有治痰而痰不為所治者十有八九是非痰之不可治也蓋因其症之凶危醫者膠於方書之語咸謂其痰之使然而中風痰厥昏迷之類遂有不可名言者矣若余於中風痰厥昏迷之類嘗有治痰而得其效矣詎敢曰一一非痰然其間因痧而有是症者雖云今之時氣使然何乃十有八九餘切其脈而不洪滑即有可疑或症有口渴身熱脈變而為沉遲或症有不渴身涼脈變而緊數此皆脈症不合須識其痧一取青紫筋色而辨之自有確見若醫者惟執為痰以治之便成大害然則古人所謂怪病之謂痰痰誠有其病之怪而余則有見夫怪病之謂痧而痧之為怪更有甚於痰也則是痧之為害莫有大於此者豈可付之不論不議耶痧筋不同辨痧筋有現有微現有乍隱乍現有伏而不現痧筋之現者毒入於血分者多乍隱乍現者毒入於氣分者多微現者毒阻於氣分者多伏而不現者毒結於血分者多夫痧筋之現者人皆知刺而放之矣其微現者乃其毒之阻於腸胃而痧筋不能大顯故雖刺而無血即微有血而點滴不流治療之法但宜通其腸胃而痧筋自現然後俟其痧筋之現刺而放之若乃痧筋之乍隱乍現者人又皆知俟其現而放之矣至有伏而不現者雖欲放而無可放吾觀善放痧之人亦未有能識其為痧者所以痧症之禍往往人受其害而不覺若斯者必從其脈之不合於症而辨之必取其所發之病在緩所見之症候更倏有其甚急者即病與症之不合又可辨其為痧則痧毒之結聚不散者自可細詳治療之法結於血者散其瘀結於食者消其食而攻之結於痰積者治其痰積而驅之則結散之後痧筋必然復現然後刺而放之其痧可得而理也如是之痧亦有可治若繼余之業者甚勿以其痧症之凶危而棄之歟寒痧辨痧症之發未有其寒者矣而亦有其痧之為寒非痧之有真寒也蓋因世人知痧之熱而服大寒之飲以至於是然寒飲服於犯痧之人有即愈者有不即愈者是何以故夫犯痧症必其無食無積無血所阻於中方可服寒飲而得其效若一有食積血阻於中而服大寒之飲則食不消積不行血不散而痧毒反冰伏凝阻於中未有得寧者矣嘗見高岩窮谷之中山路迢遙行旅感暑熱之氣往往有一飲山澗之水而即斃者是名寒痧若幸遇放痧之人乃得以識其痧而救其命蓋緣痧毒攻心服寒飲太過而痧毒隨冰寒凝結於心胸故有即斃者爾若一遇放痧之人毒血一行便無凝滯此人所以得有其命也今近處往往有犯痧症服冷水不愈者此類是也故方書所載服陰陽之水而不獨取乎井水者誠有見於此爾是以久服涼飲之後痧有未痊者又當用微溫之藥以施之余於是集方中所載三香丸又有略用附子乾薑之類均稍冷飲之誠為權宜之善劑歟若其方書所云寒痧謂當即以真寒治之而驟多用桂附乾薑吳茱參耆之類此誠有誤不可服也放痧不出治法痧症危急莫善於先放其痧乃今更有放痧而血不流者雖痧筋隱隱無可如何故放痧之人往往遇此便為凶若余則不然是其放痧雖血不流而亦有可救者即至昏迷不醒勢在臨危若審其無食積血痰阻滯於中用寶花散冷服或陰陽水或泥漿水或晚蠶沙水或細辛水或白沙糖梅水擇一方而用之俟其稍醒然後扶起再行別法療治至如有因血瘀而放之不出用童便桃仁紅花之類以救之有因飯後便犯痧症多用鹽湯或礬湯冷飲以吐去新食食久痧脹用卜子山楂麥芽之類以消之有積痧阻用檳榔大黃之類以驅之阿魏丸之類以治之或痰血凝結昏迷欲死不省人事用菜油二兩麝香一錢調下立蘇此為良法如是先去食積血痰之阻滯者則痧筋自然復現痧氣自然散行而後可刮即刮可放即放當藥即藥蓋緣痧症初發未攻壞臟腑故耳乃知初起放痧不出凶症未始不可以挽回也醫者甚毋以其放痧不出昏迷如死見為凶極而棄之歟放痧數次不愈痧症愈則即愈不愈須防其有內潰之憂故治痧之法刮之放之宜愈不愈即當用藥以治之至若雜症之兼乎痧也亦宜刮宜放而急宜用藥以治其痧為要策此治痧者不可一日無治法亦不可一日無治藥也乃今有不用藥而惟恃乎放痧竟有其放痧數次不愈者或乃曰彼無昏迷不醒之重症可無害於事也不知放痧數次不愈則必日甚一日內有伏毒盤居臟腑雖不見有昏迷不醒之事而痧毒之攻擊於臟腑間者甚可危也且放痧何以數次不愈乎蓋惟人有食積血痰阻滯其毒故痧雖放而不盡設有能消除其食積血痰則痧毒無阻尚烏有不愈者耶惟其不用藥而惟恃乎放痧故痧毒不盡勢必攻壞臟腑醫者慎毋以放痧數次不愈為輕症而忽視之歟數犯痧症痧症有緊有慢人多不識幸邇來南方砭刺有人略曉痧症一二然亦不克逐症詳明深可嘆惜故有云痧當砭刺刺即救之有云痧不可刺刺即多犯此語一出遂致誤人不淺然亦有可辨者蓋痧症之初犯者邪氣勝夫元氣雖人壯實而不免痧症多犯者由元氣虛則易感觸夫邪氣是以有數患痧症之人或有十日半月一發或有一月二月一發常患痧痛非刮則放所以有痧不可刺刺即多犯之説爾不知痧之易感必由於胃氣本虛遂乃數犯豫嘗用絶痧方充其胃氣則痧自斷又用參耆大補之味以實之痧未有不斷者矣然必痧症已痊之日全無些須痧毒然後可服以絶其根否則稍有痧氣未除此等之藥斷不可服恐其中有甘辛溫熱大補之味反益助其邪毒爾痧脹昏迷與雜症不同雜症若重或至昏迷均可以延時日獨痧症之昏迷則有不容少待者何也夫雜症昏迷不過痰氣血湧或虛極而發暈已也故可以延時日至於痧而昏迷不醒僅是痧氣衝心尤有可解若為痧毒所攻則毒血一沖勢必攻壞臟腑未有少延者矣故痧脹昏迷不醒者須防立死其毒血與食積痰氣必結聚心腹胸膈之間而經絡不轉氣血不運雖欲放而血不流欲刮而痧不顯此所以救之者又必急用藥以治之也其治之之法惟視其食積痰血氣阻及暑熱伏熱穢氣之類以治之有食消食有積消積有痰血氣阻即散其痰血氣阻有暑熱伏熱穢氣所觸即散其暑熱伏熱穢氣則胸膈一鬆昏迷自醒然後驗其紫筋青筋以刺之而或刮或藥惟其症之所發以施其救人之術歟痧筋原於血中之毒夫醫首重望聞次貴問切人皆知之矣至於痧而望聞有所未明問切有所未盡醫其可以已乎吾觀世有暗痧而人不識往往多誤則曷不取痧筋以驗之蓋針鋒所刺不過鋒尖微微入肉有痧毒者方有紫黑血流若無痧毒者其鋒尖雖刺點滴全無故痧有痧筋可辨亦如別病之有別症可辨也然則痧筋所現者青紫之色所原者乃本於血中之有其毒歟夫血中有毒既無可消自宜知放放有不盡則宜刮宜藥審寒涼而權輕重借草木以挽凶危凡以驅夫痧毒之所留滯者而救其大命焉爾奈何有不信痧者徒受夫痧症之實禍而甘心於自斃乎慢痧必須速治痧若緊者只在頃刻慢者或期至十日半月而死或期至一月二月而死甚有期至三四月而死此誠痧之慢矣而余謂必須速治者毋乃憂人之太過乎而不知其非也夫痧之致人於死者雖有如是之久而其痧毒蔓延於腸胃經絡間者正多凶險之處即如痧毒滯結於身之或左或右或上或下或里或中或表既有若是之滯結者必不尤然若是之滯結而已也將且在內者先壞臟腑在中者先損經絡在表者先潰肌肉雖未即斃而其難治之形必然先見若一不治便成死症慢痧之可畏也如是安可以死日之慢而不速為之早治乎痧症治要宜明痧無食積瘀血而痧氣壅盛者冷服痧氣壅阻於食積而無血瘀者稍冷服痧有毒盛而血瘀者微溫服痧入於氣分而毒壅者宜刮痧入於血分而毒壅者宜放痧痛而絞動者痧毒壅阻於食積之氣分也痧痛而不移者痧毒壅阻於血分而有瘀也痧發於頭面上部者痧之毒氣上壅也痧躔於手足下部者痧之毒血下注也痧有上吐下瀉者痧氣上下衝激也痧有煩悶氣脹者痧氣壅塞於心膈也痧有惡寒發熱者痧氣遏抑於肌表也痧有胸膈偏痛者毒血流滯於經絡也痧有結滯腸胃者食積血瘀為腫為脹也痧有吐血便血者痧血泛溢而憂潰敗也痧有咳嗽喘急者痧毒壅於氣分而生痰逆也痧有立時悶死者痧之毒血攻心也痧有手足軟而不能運者痧入於血分而毒注於下部也痧有腰脅具痛者痧阻於血分而有瘀也痧有偏痛於半身者毒注於半身而瘀血也痧有身重不能轉側者痧之毒血壅瘀而不能轉運也痧有變成腫毒潰爛者毒血凝滯而攻壞肌表也治痧須先明百病痧症不與雜症俱發則已若與雜症俱發醫者但能治其痧症不能治其雜症假使雜症有害不幾誤人於死者不在痧症而在雜症乎夫天下有能治百病而不能治痧者余固素其有誤於人矣茲有犯雜症兼痧之疾而業醫治痧者更不能治雜症獨可無責其有誤人之罪乎即如人有勞弱本原不足之症兼犯痧症凶危延一治痧者治之聆其言則云我固善治其痧焉始則用克伐之藥以治其痧脹之極可謂有病則病受之雖甚克伐亦無害於本原矣逮至痧已散去五六尚存三四則用藥之法雖宜尚重痧症又當顧慮本原惟在略用克伐而不傷本原者為是若一過用克伐便傷本原豈不有誤於不足之症乎況痧氣散去八九惟是略存一二用藥尤宜保護本原而稍治其痧焉至於痧患悉平惟有本原不足則自應以補益為先然後可云能治其病而無誤也若不先明於本原不足之症而用藥失宜投劑無法則其誤人之罪其能免乎即此一端可例百病故吾謂治痧須先明百病刺腿彎痧筋法腿彎上下有細筋深青色或紫色或深紅色者肌膚白嫩者方有紫紅色即是痧筋刺之方有紫黑毒血其腿上大筋不可刺刺亦無毒血反令人心煩腿兩邊硬筋上筋不可刺刺之恐令人筋吊若臂彎筋色亦如此辨之其餘非親見不明白故不具載至如頭頂心一針惟取挑破略見微血以泄痧毒之氣而已不可直刺其指尖刺之太近指甲雖無大害當知令人頭眩若一應刺法不過針鋒微微入肉不必深入刮痧法背脊頸骨上下及胸前脅肋兩背肩臂痧用銅錢蘸香油刮之或用刮舌刡子腳蘸香油刮之頭額腿上痧用綿紗線或麻線蘸香油刮之大小腹軟肉內痧用食鹽以手擦之用針説嘗覽古人遺言東南卑濕之地利用砭所謂針刺出毒者即用砭之道也但放痧之人具用鐵針輕者一針即愈重者數次不愈蓋因痧毒入深一經鐵氣恐不能解余惟以銀針刺之則銀性最良入肉無毒以之治至深之痧毒不尤愈於鐵針乎此余所以刺痧筋者獨有取乎銀針也痧脹用藥不厭多凡傷寒雜症所犯止有一症用藥不貴乎多痧症凶暴非常變幻百出如犯在氣分有兼痰兼血在血分有兼食兼積或又有兼外感內壅往往皆然不可執一故用藥治之宜盡慮到不然一有不及其禍不測此所以不厭乎多也痧脹宜下辨傷寒食未化下之太早反引寒邪入胃變而為熱熱邪固結所食不能消化乃成結胸若痧脹新食固宜以吐為先至所食既久驟然痧脹雖所食消化未盡下之無害蓋痧脹非有寒邪入胃變成熱結之患但因痧毒在腸胃則腸胃中肌肉作腫作脹盤腸絞痛遍及臟腑故外宜用刮放以泄毒於表內可即下以攻毒於裡則腫脹自當之以潛消而食積亦因之以通利原無結胸之可憂也然痧脹固非傷寒熱結者比但下之必須內兼食積又宜以漸而進中病即止痧後治雜症宜知痧退後竟治雜症固所宜然但痧後餘毒或尚存些須按脈而脈已不顯辨症而症已若清此時用藥若即認為惟是雜症已爾僅以治雜症之藥治之設使稍有相犯吾恐斯人尚不得保其命也蓋痧後尤痘後痘後之症固不可舍痘餘毒而單治雜症痧後之症又豈可舍痧餘毒而單治雜症乎此治痧後雜症又不可不深慮而於雜症劑中更兼解毒活血乃能收全功也當知不信之誤凡人有病則宜治將死則宜救乃有犯痧不信夫痧者是其智之所短即其數之所盡也故人有犯乎慢痧尤可纏綿時月而病日深若犯乎緊痧未有不立時凶危而入於死如此不信真數盡之人也即告之以痧症之禍而彼仍茫然不覺雖有熱心無益於事故不信之誤人自當知嘗見一士不信痧忽然犯緊痧暗症咽喉疼痛喘急如鋸發熱沉重胸中飽悶吹藥服藥喉中益痛痛連耳際或時在左或時移右痰脹昏迷亡危之極殆難盡述幸而審明痧症急為放痧湧出毒血甚多刮痧遍體俱有服藥至晚而安痰脹亦消喉痛亦止緣不守痧禁飲溫酒熱茶立時復發而終此真痧毒之為害也嗚呼惜哉更見同時三女一犯此症刮痧而愈一犯此症放痧而愈一犯此症認為喉鵝治之而死信者如此不信者如彼痧其可忽也耶玉衡脈法痧脈十二經辨脈芤而浮者肺痧也脈芤而散者心痧也脈弦長而動者肝痧也脈芤大而滑實者脾痧也脈沉細而動止不勻者腎痧也大腸之痧類於肺而長小腸之痧類於心而細膽之痧類於肝而數胃之痧類於脾而緊膀胱之痧類於腎而浮虛三焦命門之痧脈必怪異痧脈外感內傷辨傷食之痧脈多戰動傷血之痧脈多芤滑傷暑之痧脈多洪滑而疾數傷風之痧脈多沉微穢觸之痧脈多變異不常傷氣之痧脈多沉伏或形如雀啄傷寒濕之痧脈多沉細痧脈要訣痧症之脈與諸症之脈不同如傷寒傷風自有傷寒傷風之脈若傷寒傷風一兼痧症其脈必變病必凶暴是也凡遇雜症有痧皆然治驗一用成屠兄夫人忽然昏迷沉重痰涎壅盛已三日矣延余往視診脈洪大無倫身不發熱口不幹燥惟不省人事余曰脈症不合此痧脹也刮痧稍醒用沉香郁金散荊芥湯加山稜蓬朮枳實紫朴砂仁微冷飲之三劑而愈一忱云溪年老一子七歲發熱五日狀類傷寒昏迷沉重服傷寒藥病勢亦甚將在臨危其壻吳彩雲延余往視診其脈形如雀啄怪脈已現不可復救但細按左關指下或時厥厥動搖此暗痧而入不覺也幸其年幼可抱而起視其腿彎有紫筋三條刺之血流如注不愈用阿魏丸大黃丸清茶微冷飲之又用荊芥湯加山楂卜子檳榔細辛微冷飲之連服二頭服方知人事次日脈復如常痧氣退盡但身熱未痊乃用傷寒陽明胃經藥三劑而愈余治痧不及具述各舉一二為例以見痧症不可忽也余之痧脈要訣至矣盡矣痧症之脈莫有外於此矣議者以為余之祕夫脈而不盡言其脈之所以然者正在此也嗟嗟人之議余也以余之論痧脈而脈有未明也抑思余之刊刻是書也將以曉天下之人使天下咸識夫痧症之禍也豈有所祕而不言者乎即如傷寒自有傷寒之脈非虛語也夫冬月正傷寒頭痛惡寒身熱無汗脈必緊盛故見夫人迎緊盛之脈若余月雖有頭痛惡寒身熱無汗總名傷寒脈未有其人迎緊盛者此冬月所以有正傷寒之脈也假若冬月有正傷寒之症不見有正傷寒緊盛之脈或變而為沉遲或變而為微細是脈症之不合也多矣而又取青筋紫筋之色以辨之則痧症之發可驗而知也且如傷寒有兩手無脈曰雙伏一手無脈曰單伏必有正汗也此以汗之將來一時脈伏言之非云時時脈伏而有汗也若所犯傷寒症已如是而脈之伏也日日如是則是脈與脈伏正汗之説不合獨不可以驗其痧症之因乎又如傷寒傳經熱症有云氣口緊盛傷食之驗若人症犯胸中飽悶宜乎氣口脈緊盛矣及按其氣口之脈不見緊盛反若空虛是脈症之不合更可以驗其痧之發矣若更取青紫筋色而辨其的確以治其痧尚何疑乎即此類推餘症可以盡知痧脈有似陰症辨痧毒之氣阻抑於經絡血肉之間故其脈多沉伏即有別病兼痧者亦然如人有傷寒脈沉微無力是直中三陰經之脈也治以陰症用熱藥有何疑哉然嘗見有用之而愈者有用之而不愈者用之而愈則人將曰陰症之藥在所宜用用之而不愈則人又將曰陰症之藥不可驟用此豈其認脈之不真而治傷寒之有未當歟夫亦惟為傷寒兼痧痧脈與陰症脈相似莫辨故一服溫補熱藥痧毒變幻而有此悔爾余嘗臨症治傷寒按之見有沉微或伏之脈一似直中三陰經而其外現症候稍有不合於三陰經症便取痧筋而驗之有則為痧無則為陰施治之藥或涼或熱萬不失一且放痧服藥之後血肉經絡之分通而無阻即按其脈便不復如前之沉微或伏矣余然後按脈辨症用藥以治其傷寒藥未有不得其效者至如雜病兼痧有沉微或伏之脈亦以此法驗之誠至當不易之論也痧脈似氣血有餘辨痧之毒氣沖激於經絡血肉之分故其脈多洪數或沉緊或大而無倫或洪實有力種種不一若症脈稍有不合便當審其痧筋有無有則俟其放痧之後再診其脈之來復何如以斷其病之寒熱虛實施治若無即以其脈斷其寒熱虛實用藥余嘗治一勞弱吐紅之症其脈洪實有力他醫遇此以為勞弱吐紅脈忌洪實兼之症候凶危謝事而去余惟見其病勢之暴而疑之爰視其腿彎有青筋色先放其痧六脈遂和症候亦平又付散痧消食去積之藥氣血無阻凶暴潛消飲食漸進後用六味地黃丸及十全大補湯服之勞弱不足之症亦愈蓋因其向來病氣俱從痧氣而泄所以一用補藥遂得全效也方書脈句宜參凡古人載籍所以垂訓者不知幾經籌畫幾經筆削乃著之於書後人竟以一覽不明便置之高閣毋乃有負古聖賢作書者之心乎余嘗博覽遺言若其有得於心固然不忍釋手即令有疑於己亦且數四低徊然後得一夕豁然洞灼而大悟也有如方書所載諸痛脈伏不可診也之句余嘗疑之若以為治病之道求所以辨明虛實寒熱之法斟酌輕重緩急之宜惟脈是恃若脈伏既不可診醫者將何以斷其病之屬虛屬實屬寒屬熱之所致而於用藥之際更有可輕可重當緩當急之定論乎詎意古人之所以示我者固有先得我心而昭然筆之於書也余是以一再思之乃知所謂脈伏不可診者若謂必須求他症以辨之方有其治法焉爾故余於諸痛脈伏者固推而驗於筋之青者紫者識其為痧即於諸病不痛而脈伏者亦必推而驗於筋之青者紫者識其為痧蓋緣痧毒氣壅血阻於經絡間故脈有伏而不現爾若以針刺之血流而氣亦泄毒始無所壅阻而脈乃復其常爾至於痧之重者傷在腸胃三陰針刺有所不到血流有所不盡余惟從夫食積血痰所阻之毒以治之脈且隨藥而復則病有未愈者始可憑脈以用其藥然後思古人之所謂不可診者信乎諸痛脈伏之不可診也古人之詔我者誠有所見也哉脈貴審於幾先痧之重者形之於脈前言已概之矣至如雜病兼痧始發甚微疑似莫辨所謂審脈之道則又吾筆所難書吾言所難罄惟在醫者臨症之際神明其意於切脈之中斬截其痧於方發之始蓋痧之慢者詎云日久必壞臟腑損經絡潰肌表乎即其輕而又輕者雖不至驟傷其命而於雜病之中一有兼痧不能審治其病將纏綿難愈即愈亦必數數復發疾苦相連此痧之所以可畏當預審之於幾先也痧脈決生死法脈微細者生脈實大急數者重脈洪大無倫者凶一部無脈者輕一手無脈者重兩手無脈者死六脈無根放痧服藥不應者不治諸怪脈現放痧服藥不應者死此下細述發蒙論所不盡凡屬暗痧之類人多不識誤中其禍故悉列之於前庶令人一開帙而注目焉下卷痧症人所易明故姑置之於後暗痧辨心中悶悶不已欲食不食行坐如常即飲溫熱不見凶處更無心腹腰背疼痛之苦但漸漸憔悴日甚一日若不知治亦成大害此痧之慢而輕者也放之即愈亦有頭痛發熱心中作脹類於傷寒亦有寒熱往來似瘧非瘧悶悶不已亦有咳嗽煩悶有似傷風亦有頭面腫脹兩目如火亦有四肢紅腫身體重滯不能轉側此痧之慢而重者也誤吃熱湯熱酒熱物遂乃沉重或昏迷不醒或痰喘氣急狂亂見凶如遇是症必先審脈辨症的確果系何因在表者刮在中者放在裡者或丸或散或煎劑必須連進數服俟其少安漸為調理治驗一餘三嬸母寡居四月間忽然昏迷沉重不省人事顏色具變漸漸黑色二弟驤武次衡延他醫治之莫識其病適余至視疾診之左脈洪大右脈沉微余曰此暗痧也審其腿彎有青筋三條刺之紫黑血流如注不醒刮痧亦不醒用沉香郁金散加砂仁並荊芥湯稍冷服之不醒次日用寶花散薄荷湯加大黃丸微冷服亦不醒至五日復刮痧用三香散加砂仁湯溫下而後醒漸調理乃痊一余友朱其章一老僕六月發熱沉重昏迷不醒黑苔芒刺舌短狂罵不避親疏其章延余往視診其脈六部具伏余曰此痧之重極者也彼親中有厲姓善放痧使二人極力扶起從腿彎有青筋處刺之但微有紫黑血點而已痧血不流將入死地余用寶花散蒺藜散稍冷湯飲之又用紫蘇厚朴湯微冷服次日痧退少蘇但身重如石不能轉側舌上黑苔芒刺不退用紅花湯合清涼至寶飲治之以漸而愈一麓庵朱兄一婢十二歲六日不食頭面微腫余適與於茂生至麓庵宅即令婢出診脈冀立一消食方余曰脈微面腫殆其痧乎刺腿彎上一針紫黑血流不愈用寶花散稍冷湯飲之一服而痊傷寒兼痧凡傷寒頭痛寒熱諸症或當暑天或觸穢氣或疫癘所感忽犯痧脹是惟認脈看筋辨之先治其痧痧退之後乃治傷寒若誤飲熱湯熱藥慢者尤可緊者立時見凶治驗一余甥坦卜文木長子十二歲頭痛身熱無汗他醫皆治其傷寒不應余診之六脈微緩乃知其傷寒兼痧者也刺腿彎青筋三條紫黑毒血湧出甚多不愈用防風勝金湯稍冷服二劑痧退服小柴胡湯而痊一車姓者五月傷寒十四日忽爾發昏沉重臥不能轉延余診之余曰此傷寒犯痧若不先治其痧余不敢任不信延他醫治之益昏迷不醒復求余余曰痧氣衝心故昏迷痧毒入於血分經絡間故病不能自轉側若先治痧尚有廖日即求余治先放痧不愈用寶花散圓紅散及防風勝金湯俱微冷服痧退後治傷寒而痊一餘次女四月間頭痛發熱屬傷寒太陽經症用羌活沖和湯加減治之稍愈至第四日原照傷寒治之不應更面赤身熱心胸悶悶不已六脈洪大無倫余曰此傷寒兼犯痧症當看痧筋刺之余女不信至晚疾益甚始欲放痧在左腿彎下刺青筋一針流紫黑毒血余更有細青筋不甚現是緣不信多纏綿一日痧氣壅阻故痧筋有隱隱者爾服必勝湯三頭服稍覺身松未愈次日指上痧筋復現刺血九針服藥未愈俟至夜右腿彎復現青筋二條刺出毒血服圓紅散乃少安後又驟進飲食復發熱面赤用山楂卜子柴胡陳皮之類飲之不應脈仍洪大無倫此因痧毒復發而然刺兩足十趾青筋去其毒血用必勝湯稍冷服二劑未已偶飲稍溫茶立刻狂言此痧未盡散因溫飲而復發也用冷井水三碗飲之更冷服藥五劑然後痧氣乃清但病久身虛發暈服參湯而蘇後用十全大補湯加減治之調理二月而痊痧症類傷寒傷寒集中僅有四症類傷寒至於痧症類傷寒較之四症尤為凶暴而傷寒書內從未載及故醫者不識夫傷寒頭痛惡寒發熱屬足太陽膀胱經風寒宜表是寒從肌表而入故宜發散為先若痧症頭痛是痧毒之氣上攻頭面三陽不因外感寒氣其惡寒發熱雖在肌表是時行之氣所感由呼吸而入搏激於肌表之中做為毒熱內熱則外寒故亦惡寒治宜先刺顛頂放痧以泄其毒用藥惟在透竊解毒順氣為主若誤認傷寒足太陽膀胱經症用羌活麻黃發表太甚反助痧毒火邪益張其焰勢必惡毒攻衝作腫作脹立時見凶故痧症與傷寒其頭痛惡寒發熱雖同治之當異要知痧症宜清涼則痧毒可內解傷寒宜辛散則寒氣可外舒固不可以治痧症者治傷寒更不可以治傷寒者治痧症也治驗一林管家長子六月發熱五日昏迷不醒余診之病似傷寒而脈沉微無力實非傷寒症也閲腿彎下痧筋放紫黑毒血三針指頭九針不愈用阿魏丸並大黃丸涼茶飲之昏迷遂醒越兩日身涼乃痊一車文顯次子惡寒發熱十二日昏迷沉重不省人事適余至鄉延余診之見其面色紅黑十指頭俱青黑色六脈洪數皆曰新婚燕爾症必屬陰餘日非也若以陰治一用溫補熱藥殆迫其死矣夫脈洪數者痧毒搏激於經絡也十指青黑者痧之毒血流注也面色紅黑者痧毒升發於頭面三陽也及視腿彎痧筋若隱若現放之微有紫黑血點而已其父素知痧患便云此真痧也奈前因暗痧莫識數飲熱湯毒血凝聚於內放之不出將何以救之余用寶花散晚蠶沙湯冷飲之漸醒痧筋復現於左腿彎二條刺出紫黑毒血如注乃不復如前之昏迷矣但發熱身重不能轉側肩背多痛用大劑桃仁蘇木烏藥香附白蒺藜末澤蘭獨活山楂微溫服之漸能轉運尤身熱不涼大便不通用卜子麥芽枳實大黃紫朴桃仁溫服便通熱減後調補三月而痊一方居安內室正月頭痛惡寒發熱心胸煩悶口渴咽乾頭汗如雨痰喘面黑十指頭具有黑色已五日矣延余診之氣口脈虛時或歇指左手三部洪數無倫余曰非痧而有是脈恐不能生矣因看痧筋幸其弟善放痧見有青筋曰此真痧也刺頂心一針左臂彎一針右腿彎一針毒血已去不愈余想其飯後起病即以礬湯稍冷多服吐去宿食煩悶痰喘頭汗具除餘症未愈次日其弟復為放痧飲以陰陽水一碗亦未愈余用柴胡山楂連翹紅花卜子枳實荊芥花粉加酒製大黃二錢俟微冷服二劑大便通而安逮後十餘日腹中大痛口吐涎沫此又因穢氣所觸而復痧也令其刮痧少安用藿香正氣湯稍冷服之腹痛頓止後用補中益氣湯十全大補湯調理如舊一甄復先惡寒發熱嘔噦心煩服他藥昏迷不醒或謂陰虛而然余診之六脈沉微手足大熱唇舌鮮紅身體重痛余曰痧毒衝心入於血分瘀滯故爾不信連易三醫莫任復求余治呼之不應扶之不起用晚蠶沙煎湯微冷服次以寶花散煎砂仁湯微冷送下稍醒然後扶起放痧數十針未愈用桃仁延胡索蘇木烏藥紅花香附山楂一劑始能轉側後服小柴胡湯寒熱具除調理兩月而痊痧類瘧疾痧有寒熱往來類乎瘧疾或昏迷沉重或狂言亂語或痰喘不休或心胸煩悶叫喊不止或嘔噦吐痰睡臥不安或大小便結舌黑生芒如此重極脈必變異不與瘧同宜細辨之治驗一沈日岩七月間日晡寒熱昏沉脹悶大便不通舌焦苔厚延余治瘧左脈浮大而虛右脈沉細而澀愚意瘧疾見凶脈不應虛且澀視其乳下有青筋刺出紫血毒血二針令其刮痧不愈用散痧消毒活血之劑加大黃三錢稍冷服之大便通諸症退惟寒熱未已用小柴胡湯治之後用四君子湯調治而痊瘧疾兼痧瘧疾臥床往往有因暑熱相侵心中迷悶或時疫之氣相感兼犯乎痧瘧因痧變勢所必至不可漫以為瘧而忽視之也瘧之為害尚可延久痧之為害必致傷人即令痧之輕者苟不知治纏擾於身不克驟愈雖或幸愈數復難痊自非先治其痧決難全愈兼痧之禍可勝道哉治驗一錢拱宸內室患瘧發熱不涼痰嗽煩悶口渴不食余診之氣口脈虛左三部微澀而數此兼痧之症也令其放痧用散痧順氣活血解毒藥不愈次日又放痧脈始弦數又如前劑服之不復煩悶矣後用柴胡雙解飲三劑瘧愈止用消痰順氣藥加童便飲五劑痰嗽俱痊一餘三子五月間患瘧凶暴左脈沉微右手脈伏驗有腿彎手臂青筋刺出紫黑毒血稍覺胸中爽快用寶花散沉香丸稍冷服之遂用大黃丸並服可扶而起次日復傷食又患兼痧凶暴益甚更放痧凶暴始減用散痧消食順氣解毒藥五劑稍安後又傷食發熱用山楂卜子青皮陳皮紫朴白芥子四劑大便不通加枳實大黃便通熱減惟病久虛極時覺眩暈心跳夜睡不寧用棗仁茯神人參黃耆熟地加熟附子一二片煎服夜睡神安調補四月而痊一沈恆生內室六月間瘧疾日晡寒熱已八日忽壯熱不已昏沉不醒延余診之左脈弦數不勻右脈虛而沉澀余曰左不勻右虛澀非瘧脈也殆其為瘧之變症非痧而何刺左臂青筋一針紫黑毒血流出如花不愈服荊芥湯加藿香卜子紫朴檳榔並化毒丹微冷飲之稍醒次日復刺指頭紫黑血三針用荊芥湯加枳實大黃微冷飲之熱退後用三香散運動其氣調理一月而痊
