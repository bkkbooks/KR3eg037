body:
  text: 卷之中遍身腫脹痧痧者暑熱時疫惡毒之氣攻於裡則為痰喘為血瘀昏迷沉重不省人事若元氣壯實內不受邪不入於裡即散其毒於肌膚血肉之表為腫為脹若誤飲熱湯熱酒便成大害此痧之暗者宜從脈異處辨之治驗一翰黃聞兄一婢久生瘡患腹大如臌手足俱腫延余診之左脈微數右脈或時歇指余思瘡毒入內作腫作脹其脈必然洪數有力方見脈症相對乃可治其瘡毒今左脈微數右脈歇指脈症不合必慢痧為患也視其腿彎果有痧筋青色刺五針紫黑毒血流之如注未愈又刺指頭毒血二十針用寶花散並付桃仁紅花湯八服服後腫脹俱消如舊一翰黃聞兄長女手足具腫將逮於腹延余診之六脈弦細沉遲知其為慢痧之變症也云宜先放其痧緣畏刺不放余辭不用藥恐藥氣稍冷不能治及於血肉之分也越六日腫脹益甚復延余治令其僕婦為主女放痧三十餘針紫黑毒血已出用寶花散稍冷服之並用散痧解毒消瘀順氣之劑治之以其痧久綿延難於速效計服二十四劑方得腫脹具消安平如舊一賈峰青遍身腫脹服藥不應延余治之余見心口將平臍有青筋余曰危哉診脈無根殆不可療然視其指上腿彎青筋交現刺出毒血甚多彼又謂痧症不當服藥遂已後至二月餘終成真臌而死惜哉一余鄰許姓者有子四歲頭面胸腹手足遍身俱腫脹紅色頭汗如珠不絶求余診視兩關兩尺皆洪大滑實兩寸厥厥動搖此傷食之痧感於脾經故遍身肌肉腫脹及看其痧筋不現刮痧不起此因誤飲熱湯痧氣內攻壅塞衝心故遍身作腫作脹惟衝心心臟不受其害故上幹頭面化而為汗出之如珠皆心液也用紫朴湯加大黃丸微冷飲之脹消汗止而愈悶痧痧毒衝心發暈悶倒地一似中暑中風人不知覺即時而斃此痧之急者如略有蘇醒扶起放痧不愈審脈服藥施治如發暈不醒扶之不能起必須審脈辨症的確果系何因先用藥數劑灌醒然後扶起放痧漸為調治治驗一汪君美內室六月間發暈昏迷延余診之兩寸芤而散餘脈如常但重按之時見歇指此暑熱穢氣觸犯心經之痧也扶之不起先用寶花散薄荷湯並藿香湯冷服稍醒扶起刺出毒血三針不愈用沉香阿魏丸薄荷湯微冷飲之漸安後用四物湯調理而愈落弓痧倏忽昏迷不醒或痰喘不已眼目上吊形如小兒落弓之症此暗痧難識必須審脈辨症的是痧毒看其身體涼熱唇舌潤燥何如然後治之治驗一盛洪烈子九月間發熱口渴昏悶不醒兩目上翻延余診視六脈微細而伏先用寶花散加砂仁湯冷下而蘇扶起放痧十二針去紫黑毒血用救苦丹並細辛大黃丸加砂仁湯稍冷下又用防風散痧湯加金銀花丹參山楂卜子而痊一陳公玉八月間時常身熱口中微渴煎滾茶飲之倏然沉重昏迷不醒余診之左尺沉細動止不勻右寸脈浮而芤此腎虛而痧犯之腎水之痧逆行干母肺金故痰氣壅盛而發暈也用獨活紅花湯入貝母牛膝同煎加童便飲之更進圓紅散而醒然後扶起放痧二日後痧氣清用補中益氣湯六味地黃丸調理而痊噤口痧默默不語語亦無聲形如啞子此乃痧氣壅盛熱痰上升阻逆氣管故咽喉閉塞而然治宜先放其痧審其肺腎脾三經之脈為要然後推詳余經之脈則知病之所本矣治驗一吳子瑞一女十一月間忽然痧脹心中煩悶昏沉不語子瑞善放痧稍醒語更終日無聲余診之左關有力右脈沉伏傷氣之痧也此女日為後母所詈故有此變用陳香丸一丸煎湯微冷飲之稍有聲焉未愈次日左脈弦長而動余曰怒氣傷肝痧氣猶阻於肝經之故刺腿彎紫筋三針血流如注又刺頂心臂指二十餘針乃用三香散陳皮厚朴湯加延胡索香附微溫飲之乃痊角弓痧心胸脹極痧毒內攻故頭頂向上形如角弓反張是臟腑已壞死症也不可以治撲鵝痧痰涎壅盛氣急發喘喉聲如鋸痛若喉鵝但喉鵝之症喉內腫脹若痧則有如喉鵝之痛而無喉鵝之腫脹又形若急喉風但喉風之症痛而不移若痧則痛無一定且痧有痧筋喉鵝無痧筋此可辨也治驗一施三先痰氣壅盛吹吊痰藥益凶暴痛極余診之脈多怪異此三焦命門之痧也閲臂指筋刺十一針腿彎有青筋刺三針出紫黑毒血甚多不愈用沉香郁金散救苦丹清茶冷飲之外吹冰硼散又用荊芥銀花湯微冷飲之三劑而痊一周龍生喉痛之極痰涎壅盛延余余曰痧也不信飲熱湯至夕而殂傷風咳嗽痧痧從時氣所感因而咳嗽肺經受傷不可以傷風治之蓋傷風以疏風為主若痧則純乎疏風非其所宜當刮痧為先宜清喉順氣涼肺散痧為主若專重疏風縱非緊痧急症亦必咳嗽日甚纏綿不已勞嗽等症由此而成慎之慎之治驗一徐茂公傷風咳嗽日晡微寒發熱余診之右寸脈浮而芤餘脈虛而無力時氣所感肺經之痧也其弟為之放痧刮痧稍可不服藥至十餘日咳嗽不止余用射干兜苓湯加前胡山豆稍冷飲之漸愈痘前痧脹痘本先天因時而發必由外感至若痧者亦時疫之氣所感作脹作痛而胎元之毒因之俱發凡痘未見點之前痧脹必心胸煩悶痰涎壅塞甚至昏迷沉重不省人事此其候也其小兒滑疾之脈類於痧症厥厥動搖之脈雖若疑似難明然痧有痧筋可辨宜先刺出毒血而後用藥清理之則痧自退痘自起矣若痘點既形觸穢痘隱者諸痘科自悉不贅治驗一夏子亮幼子五月發熱痰喘氣急四肢戰動兩目無神不省人事口熱如爐面有隱隱紅紫細點延余看痘閲其腿彎有紫筋兩條余曰兩目無神四肢戰動痘之候也隱隱微點痘之形也口熱如爐紅紫之色熱之盛也但是痰喘氣急有腿彎紫筋兩條必痘因痧脹而發治宜先放其痧後發其痘則痘自起用針刺出毒血隨用荊芥連翹防風紅花青皮桔梗枳殼山楂卜子一劑俟稍冷飲之其痘即發至十二朝乃痊痘後痧脹痘後中氣多虛有感必傷尤宜防護嘗有小兒痘後收靨脫痂安然無事一遇暑熱所侵或穢惡所觸即成痧脹往往有忽然生變人多認為惡痘所致即痘科任事者亦以為然競不知其痧之為害有如斯也治驗一胡丹扆子七歲八月出痘脫痂光潔飲食如常行步如舊逮二十五朝忽然叫喊不已發暈欲死皆以為惡痘餘毒使然求余治之左右手六部俱微細而伏余思惡痘餘毒兆變脈當沉緊有力今微細而伏若此脈症不合視其痧筋歷歷可指刺出紫黑毒血不愈用荊芥銀花湯合和脾宣化飲稍冷飲之即蘇後小腹痛變為痢疾用當歸五錢山楂一錢熟大黃五分加童便微溫飲之稍安後獨有用當歸山楂四劑而痊一張可久女十五歲痘後三十二朝忽然發暈沉重不能轉側延余診治右脈微細左脈洪大時一歇指視其指頭黑色青筋歷歷刺出毒血不愈用降香桃花散合枳實大黃湯稍冷飲之不愈用三香丸微溫服而痊後傷食為穢氣所觸腹痛刮痧服稜術湯加明礬二分微冷飲之而安胎前産後痧孕婦之痧最易傷胎産後之痧須防惡阻較之平人更甚當急為救療庶於痧毒未攻壞臟腑之時可以施治若屬暗痧發於此時胎前痧脈溷於有孕産後痧脈雜於惡阻又無心腹痛劇痧從暗發須當究其症候察其聲色看有痧筋急宜刺破肌膚痧擁尤重油鹽至若痧毒橫行肆攻臟腑莫可挽回慎毋草草以誤人也治驗一趙方亨內室懷娠六月寒熱交作煩悶不安延余時痧在始發脈固未現初不覺其為痧用藥不應忽爾昏沉次日余診左手脈伏面目微黑乃識其痧刺腿彎青筋六針出毒血少愈用桑寄生紅花香附益母草荊芥細辛卜子神麯沖砂仁末微冷服而安後用小柴胡湯退熱又參苓歸地健脾養血乃痊胎前痧痛論胎前痧痛毒氣攻胎尚懼胎孕絞動傷胎殞命況痧有毒血攻衝胎孕嬌嫩決難安靜至如安胎用白朮當歸茯苓之類痧所大禁若一誤用立時痧脹凶危其痧脹所宜惟是破血破氣之劑又胎孕所忌愚嘗斟酌其間若刮痧放痧不愈必欲活血解毒用金銀花丹參益母草紅花桑寄生消瘀而不損胎元順氣用香附陳皮紫朴砂仁烏藥行氣而不傷胎氣散痧用荊芥防風獨活細辛透竅而不動胎孕消食積用山楂卜子神麯麥芽寬中而不伐胎性採擇於中最為穩當然痧毒勢盛此等之藥難於速效或權用一二味克伐又恐於胎有害此豫所以反復而不敢輕任也産後痧痛論産後用藥必須溫暖痧脹用藥惟重清涼此症屬相反處治之方毋執産後一於溫暖亦毋執痧脹一於清涼也愚嘗遇此等症竊以為消瘀破血之藥雖同其餘有不可通用者是以制就一方為臨症之法散痧用獨活細辛破血用桃仁紅花順氣用香附烏藥陳皮解毒用金銀花紫花地丁消食用山楂卜子神麯麥芽如産後用薑炭肉桂以溫血痧症所大禁痧症利用荊芥防風以散痧連翹薄荷以清熱産後所不宜況痧症脹極尤重大黃枳實檳榔以通其積滯而産後之藥更不可不禁恐用此傷産後之氣分也且産婦服藥宜溫痧症服藥宜冷若痧而用溫脹者益脹産而用冷瘀者益瘀故豫臨症惟取微溫之氣則既無害産後而亦無助痧禍若痧更凶極微溫之氣難於制治加童便以清熱消瘀産後痧症俱得其宜矣治驗一顧月溪內室産後三日腹中絞痛脹大如臌惡露不通延余診之余思産婦腹痛當在小腹大腹脹痛亦僅微疼今産婦大腹絞痛異常非産婦本症及按脈洪數有力余曰此産後兼痧脹也當取痧筋驗之不信漫服産後藥益覺昏迷不醒復求余治勢已危極痧筋不現先取童便一杯飲之少蘇閲十指筋刺出紫黑毒血二十一針然後扶起放腿彎痧六針絞痛稍定用獨活紅花湯微溫服之逮痧毒消盡脹痛盡止惡露俱通後調補乃痊一蔣南軒內室産後八日惡露去血過多忽惡寒發熱胸中脹悶垂危延余脈洪大無倫余思惡露不盡尤可今惡露去盡何以驟得此脈因語之曰脈甚凶若兼痧可救南軒善放痧信余言入視痧筋紫紅色者二條放毒血余復診之不復洪大又刺指臂出紫黑毒血三十餘針用獨活細辛柴胡金銀花丹參益母草牛膝石斛烏藥山楂陳皮四劑微溫服之寒熱脹悶具除後調補而愈一單公廉內室産後六日遍體疼痛寒熱如瘧昏悶異常延余六脈時有歇指閲左中指右無名指微帶黑色乃知兼痧之症刺指上紫黑毒血七針臂上毒血一針舌底下紫黑毒血一針昏悶疼痛稍緩用獨活桃仁蒼朮香附童便薑黃山楂微溫服二劑疼痛昏悶具除但寒熱未已用金銀花丹參益母草艾柴胡獨活姜灰牛膝山楂溫服四劑寒熱乃瘳調補月餘而健倒經痧經行之際適遇痧發經阻逆行或鼻紅或吐紅肚腹腫脹臥床不能轉側者是也肚腹不痛亦為暗痧若痧毒攻壞臟腑者不治治驗一沈弘先內人經期發熱鼻血如注昏迷沉重肚腹作脹延余診之脈伏余曰兼痧而經逆者也弘先善放痧刺腿彎二針出紫黑毒血不愈余用桃仁紅花獨活細辛山楂香附青皮加童便飲之經行調理而愈痧熱頭汗痧狂譫語附痧氣壅盛發為熱症或熱而不涼或日晡發熱或潮熱往來皆痧毒之氣阻而不通搏激肌表發而為熱不識者認為外感傳經熱症發汗溫飲即慢痧遲緩勢必痧氣益盛變出頭汗發狂種種重症不知外感之脈浮數而緊熱症之脈洪數有力痧症之脈終有不同或有可疑須看痧筋有無辨之即明治驗一沈懷先夏月日晚發熱五日不涼諸藥不效反益昏悶煩躁余診之右三部及左關俱微細無力余見其病氣有餘脈反若不足知非真不足乃痧脈之變者也先令刮背上痧又於十指臂彎刺出紫黑毒血三十餘針不愈用冷茶送寶花散二服又以陳皮厚朴湯主之倍加玄胡索香附煎湯稍冷服四劑而痊一邵洪玉內室日晡發熱頭汗如雨延余六脈震動不常故知其痧刺出十指紫黑毒血二十針不愈煎紫朴湯稍冷服三劑痧氣已盡用大黃三錢枳實陳皮厚朴各一錢煎湯溫飲下其結糞熱退身涼後朝用補中益氣湯夕用六味地黃丸調理而痊一褚元龍夏月潮熱往來已六日矣服他藥熱極不涼發狂譫語延余左脈俱微右脈俱洪大非痧脈不若是之異也視其乳下青筋二條刺出紫黑毒血不愈用桃仁澤蘭等分煎湯平服神情始定日漸調理半月而痊痧煩痧睡痧氣衝於心胸故心煩或嗜睡此等之痧俱屬慢痧之類輕而且淺人多誤以心煩嗜睡治之日甚一日倘日服熱酒熱湯熱物雖非驟然緊急勢必日漸凶險故並録之以示戒治驗一王培元適會於其弟宋臣書室云及心煩之甚已非一日將服他藥余診之脈症不合止而不服閲腿彎痧筋刺而放之不藥而痊此等痧甚多姑記一以為例一余弟驤武每心煩嗜睡自識其痧便欲刮放不藥而痊此由中氣虛故易感痧患雖輕之至不足具述然亦痧之一症也姑録之以廣其說老弱兼痧先有痰火咳嗽之疾忽爾喘急痰涎喉聲如鋸或頭汗如油喘而不休心胸煩悶莫可名狀雖云痰火危篤往往有之然亦有兼感時氣或穢氣所觸驟然勢盛者凡治必宜細細察脈按症先清其痧次治其痰然後漸補氣血則標本兼得其理矣治驗一汪子建母七旬有餘素犯痰火老弱之症忽痰涎壅盛喘急不休喉聲如鋸延余診視六脈不勻有如雀啄雖老弱痰火之脈嘗有歇指亦不足怪然視其驟然作變病必有異余曰此兼痧症尚可治也閲其左腿彎下有青筋二條刺之紫黑血流如注先用散痧消食豁痰順氣之劑並進牛黃抱龍丸病勢漸安後惟補其氣血乃痊一盛君和母五十歲痰火多年忽面赤頭汗遍身俱腫喘急煩悶倍常延余診視余思老年痰火固所宜然何面赤頭汗遍身俱腫之驟也及按其脈又與症相合不可據以為痧然恐痧之為禍不小若竟以老弱痰火治之終覺疑而不安細視其十指有細紅絲筋歷歷可驗則其痧之為老弱變症也明矣先治其痧刺指頭二十餘針去其毒血次用稍冷湯服寶花散面赤頭汗身腫俱除喘急亦漸和緩唯是老弱痰火為終身之疾瘡症兼痧瘡痛者心火血熱所致故火盛而膿腫作痛然膿瘡雖痛必漸漸而極非若兼痧之驟故凡瘡瘍兼痧其腫痛必多可畏處況瘡瘍脈多洪數兼痧脈固不同其筋色又有可驗也治驗一潘子亮女十八歲患瘡已半載忽一日飲酒後膿瘡大盛或以其酒助血熱且食雞鵝發毒之味膿瘡腫痛由斯而極治以涼血活血解毒托裡之劑更覺昏迷飽悶延余治之脈不洪數而反沉微余曰脈不對症必痧使然刺出指頭毒血又刺頭頂心一針神情方始清爽但胸中飽悶用順氣散痧消毒之味四劑微冷飲之兼外搽合掌丸飽悶膿瘡俱愈弱症兼痧先有勞弱不足之症或吐血時發或微微干嗽兩顴唇口鮮紅或骨蒸發熱不已一觸犯時氣傳染或穢惡之氣相犯必兼痧脹或多痰喘或咽喉如鯁或心腹脹悶煩躁發熱較之平時不足之症益覺沉重此宜以痧為主治之令痧毒退盡方可治其本症不然勞弱未見凶危痧禍已在目前矣治驗一婦人吐血乾嗽晝涼夜熱已久忽午後發熱異常脹悶沉重他醫以為怒氣血虛用養血化痰順氣之劑病勢益盛昏迷痰喘不省人事延余左關微緩無力右關似緊非緊餘脈應指不勻余思怒氣填胸左關必須有力平時勞弱脈亦自宜弦數內有鬱血上中二部亦當見芤何脈不對症若是看其左腿彎有紫筋數條歷歷可指其為兼痧之症明矣故昏迷痰喘先刺其痧筋出其毒血倍用寶花散清茶微冷飲之方得神情清爽不復痰喘昏迷脹悶沉重之勢但勞弱由於本原不足綿延未愈痧變勞瘵痧症有惡飲熱湯者有反喜飲熱湯者惟其喜飲熱湯痧症益莫能識慢痧所以變成勞瘵也原其痧毒之始入於氣分令人喘嗽吐痰發熱聲啞蓋火毒傷肺肺為嬌臟若不知治變成百日緊勞輕者數年難愈卒至危亡痧毒之始入於血分重者兆變在即輕者歲月延捱若乃毒瘀胃口必須去盡而愈毒瘀肝經損壞內潰吐血數發勢極多危毒瘀心包絡更加凶險不待時日毒瘀腎經腰脊疼痛嗽痰咯血日甚一日不可得痊凡痧毒遺患總成勞瘵治須識之於始凡臟腑之病俱可療治莫咎其終若一潰損臟腑便屬不治治驗一王君瑞內室咳嗽吐痰發熱左背疼痛已年餘矣延余診之六脈浮緊洪數脈症不合又無痧筋但用刮痧痛減服散痧清熱消痰順氣四劑而愈一楊音節痧脹不服藥惟放痧三次胃脘間成一大塊咳嗽吐痰發熱不食日漸尪瘦延余診之右關脈芤而緊餘脈俱數余曰內有瘀血必吐出而可解用桃仁蘇木澤蘭白蒺藜香附烏藥酒煎服之吐紫黑血碗許更用活血引下之劑加童便酒服之而愈一左元峰痧脹放痧三次不服藥痧根不絶變成勞瘵咳嗽咯血音啞發喘骨瘦如柴脈洪大無倫余辭不治又二月而終膨脹兼痧先有膨脹而痧氣乘之臌脹益甚在臌脹不可先醫在痧氣自宜早治治驗一江云甫肚腹脹急如臌臍突筋青心口將平余診之知為血臌之症其指頭黑色此臌症之所無也視指上有青筋兼痧無疑刺二十餘針又刺臂彎腿彎青筋五針俱去其毒血略鬆用蒺藜散微溫飲之臍下青筋漸退後用臌症之藥導去惡水日服治臌香圓丸二月餘臌症盡平永不復發痧變臌脹痧者毒也慢痧之毒遷延時日留滯肌膚腸胃血肉之中若不早治即成真臌治驗一嚴天玉次子氣急作脹胸腹飽悶臍下有青筋突起心口將平此慢痧成臌也刺腿彎青筋六針出紫黑毒血甚多又刺指頭出毒血二十四針臍上青筋即淡色腹內覺鬆用寶花散微冷服腹脹漸消其後不復用藥施治但恐其根未除日後復發姑志之以例其餘半身不遂痧心主血痧毒入於血分故易攻心此痧症所以發昏也若痧之慢者沖激遲緩未逆於心留滯經絡或在於右或在於左為半身疼痛或麻痹不仁如此半身不遂總因痧毒之遺害也治之者見有痧筋急宜刺破然後用藥以散其毒活血以消其瘀則痧根既拔其症漸痊若不知治綿延日久痧毒益深勢不可遏當又有變症難愈矣治驗一章道庵屢患吐血發熱不涼左半身疼痛不已行步艱難延余診視初不覺其為痧也細思脈症不合之處檢其痧筋刺之用桃仁澤蘭獨活烏藥煎二劑微溫服吐血疼痛俱愈永不復發一盛成年朝涼夜熱氣急半年服藥不應反加右半身疼痛不能俯仰咳嗽吐痰飲食減少成勞弱不足之症棹舟迎余脈不見弦數而微細時有歇指脈症不合閲其痧筋刺二十餘針用薑黃旋覆花丹參橘紅赤芍玄胡索澤蘭山楂角刺穿山甲二劑微溫服疼痛吐痰俱除後朝用六味地黃丸夕用補中益氣湯朝涼夜熱俱愈內傷兼痧人有內傷詎無外感外感之症不獨風寒即夏月暑熱之氣時疫傳染之氣穢惡觸犯之氣一受於身亦如外感然則內傷者本病外感者標病故傷寒集中有內傷外感之症此之集中有內傷兼痧之症治法主意先辨痧症治其標後審內傷治其本治驗一曹洪宇子之外戚爭奪家産涉訟公庭有老婦造其家互相爭毆發熱沉重咳嗽吐痰胸中脹悶諸親戚惟恐斃於曹姓室中延醫青來王兄更邀余往視青來幾不敢任余憐憫此婦不治入命重情彼此俱敗若一救之不特活婦一命亦且保全兩家是亦大德余為診之知其內傷兼痧症也刺痧筋二十餘針付寶花散微溫服之脹悶稍松爰定一方即於青來廂中取藥用桃仁赤芍澤蘭玄胡索紅花陳皮烏藥獨活治其內傷服後下黑糞瘀血俱消諸症俱愈但其舊有不足之症非參不可後青來用參耆大補乃健而歸紫疱痧痧症不內攻則外潰余於發蒙論中已略陳其概矣無如痧症變異更有難盡述者即若為腫為毒之外又有發為紫血疱者此真痧之異者也余故記之以例其餘治驗一余鄰許秀芝女嫁為養媳婦手足下半身俱腫大腹亦脹發出兩腿足紫血疱如圓眼大密難數記皆云此爛瘋之症服藥益甚秀芝憐惜其女載與俱歸求余治視疱多可畏及見有痧筋發現於腿彎方知痧者尤樹之根疱者尤樹之葉也遂為放痧三針又刺指頭痧二十一針盡去其毒血復診其脈六部俱和殆其痧毒之氣已散但存肌表紫疱而已用蘇木紅花澤蘭桃仁烏藥桔梗川芎牛膝二劑溫服凡紫血疱盡收靨結痂而愈痰喘氣急痧先有痰喘氣急而痧脹因之先治其痧後治其痰氣無令痧為本病之助先有痧脹而痰喘氣急因之但治其痧而痰喘氣急自愈若痧有寒熱不清痰喘氣急者兼和解痧有有熱無寒痰喘氣急者兼清熱痧有食結不化痰喘氣急者兼消食順氣痧有大便不通小便不利痰喘氣急者急攻其里痧有痢下膿血或赤或白痰喘氣急者急攻其積痧有瘀血凝滯小便利大便黑痰喘氣急者急消其瘀痧有嘔吐紫黑血或鮮血痰喘氣急者當慮痧毒攻壞臟腑不痛者可治痛而不已者難治服藥不應者死治驗一祖南軒四月發熱頭痛脹悶昏迷痰喘氣急延余六脈無根余曰脈法六脈無根者死若為痧脹而然則有救其家善放痧因閲痧筋放之不愈余用沉香郁金散圓紅散稍冷服又用化毒丹一服昏迷即醒脹悶痰喘氣急俱平更用防風散痧湯加青皮連翹山楂卜子熟大黃一錢服之發熱頭痛俱已六脈如舊一費道元內室痰喘氣急脹悶不已延余左三部脈浮緊而數右三部脈如無余曰痧脹暗發也其兄善放痧刺乳下出紫黑毒血二針如注六脈復舊余用和脾宣化飲二服稍冷飲之痰喘氣急脹悶俱痊一錢公肅子二月晚間痰喘氣急發熱身重腹中絞痛延余脈沉微刮痧放痧不愈用藿香湯稍冷服之又用稜術湯加大黃五分微溫服之諸病俱痊痧瘋瘋者天地間厲氣所感發而為瘋蓋惡毒之氣纏血肉散於肌表留於經絡以成瘋症最惡侯也若痧者亦時行惡毒之氣變為大瘋尚何疑乎余昔在秦溪嘗見一人犯大麻瘋症眉發俱脫面目頽敗手足蜷攣遇一老者為之放痧三次曰此痧瘋也傳汝一方金銀花六錢黃芩一錢五分皂角刺一錢赤芍二錢紅花二錢牛膝三錢苦參四錢生地二錢水煎日服日漸而痊若余於此症固未嘗治及不敢虛載治驗適余經見老者所治有然故附録之以見痧症之亦有是變焉痧重痧症始發勢雖凶暴未必身重若飲熱湯熱酒痧毒即阻塞於經絡血肉之間遍身重痛不能轉側放痧之後治宜消瘀解毒為先初起易治久則難治放瘀服藥不效者死治驗一邵光先十二月腹中微痛嘔噦酸水以為胸中受寒服薑湯一碗遍身大痛腹脹身重不能轉側迎余右脈俱伏放痧用當歸枳殼湯稍冷飲之又用桃仁紅花湯微溫服次日痧毒之氣漸減又放痧服如前藥而愈一莫乘雲次子頭痛發熱胸中脹悶飲熱湯一碗遍身疼痛不能轉側臥床不起服他藥益昏沉延余右寸氣口脈虛左寸微細關洪緊有力知其痧也刺指頭出毒血九針少愈用消痧活血解毒藥三劑而痊眼目痧痧者火毒也若犯痧症適與心主之火相合故痧毒逆沖最要防攻心之患今少陰心君不受邪逆犯厥陰肝母故兩目紅腫如桃甚則眼珠突出最為凶險然他症患目惟在於目若因痧為患必然先覺心中煩悶而目疾因之苟不知早治則痧毒已參陽位其火勢之炎熱輕則壞目重則殞命治宜先刺巔頂百會穴以泄毒氣當放者放刮者刮用清火活血順氣之劑加牛膝石斛以引火歸原誠為良法治驗一江道誠患心中煩熱頭眩忽兩目紅腫大痛飲熱茶熱酒眼珠突出左目尤甚至晚即昏沉發暈延余診視左脈微細無根痧毒之為害也放痧不愈用金銀花茜草連翹黑山梔枳殼丹皮赤芍牛膝石斛草決明加童便微冷飲之眼珠始收調理而愈瘟痧寒氣鬱伏於肌膚血肉之間至春而發變為瘟症是名瘟痧又暑熱傷感凝滯於肌膚血肉之中至秋而發亦名瘟痧但春瘟痧毒受病者少不相傳染時或有之秋瘟痧毒受病者多老幼相傳甚至一家數人犯痧或一方數人犯痧其發也必惡寒發熱或腹痛或不腹痛似瘧非瘧或氣急發喘頭面腫脹胸腹飽悶或變下痢膿血輕者牽連歲月重者危急一時治宜放痧消食積為主俟痧毒已泄然後和解清理除其寒熱健脾養血補其中虛治驗一洪公震九月惡寒發熱吐痰咳嗽胸中煩悶口渴舌苔延余診之左脈時有歇指右脈沉而有力刺痧筋毒血不流後臥床不醒益覺沉重此誤飲熱湯為害也用陰陽水一碗加明礬二分飲之又用消食去積之藥加熟大黃一錢微冷飲之少愈次日痧筋復現刺臂彎一針十指二十二針去毒血用活血解毒藥諸症漸鬆調理而痊一公震內室同時惡寒發熱頭面腫脹心胸煩悶似大頭瘟診之六脈俱伏此瘟痧也放痧不愈先飲微冷礬湯次用透竅消毒下氣之劑加牛膝三錢同煎微冷飲之二服全愈一公震次子十月寒熱如瘧心腹絞痛吐瀉不已六脈沉緊亦瘟痧為害也用沉香阿魏丸清茶微冷下並和脾宣化飲入大黃一錢同煎微冷飲之次日再服如前而愈頭眩偏痛痧痧氣慢者上開於三陽頭面常覺頭眩內熱或半邊頭痛心煩不安宜刮痧不愈用清涼之劑治之治驗一鍾仲宣數數頭眩日漸益甚或時右偏頭痛脈症不合刮痧不藥而痊一潘尚峰苦頭眩或左偏頭痛服他藥不應延余脈微與症不合放痧不愈用清熱下氣之劑而痊流火流痰痧痧毒傳變不待時日朝發於足而足腫痛夕流於手而手腫痛朝發於肌膚而肌膚紅腫夕入於裡而痰喘不休此等之痧乍隱乍現乍來乍去按之脈而痧脈或不現最難識認如痧毒所流及之處熱者似流火而非流火腫者似流痰而非流痰或痛極難忍或癢痛不已又痧之變者也欲知此痧須看病勢凶暴不比流痰流火之輕緩者驗之於痧筋發現刺之無疑然後憑脈所犯風寒暑濕及食積痰血氣阻分治之斯能有效如或不覺便成死症治驗一張宏原內室日間左足小腿紅腫大痛暮即腹痛而足痛止次日左足小腿又復紅腫大痛而腹痛又止來去不常痛無一定延余診之六脈如常而微數此平人之脈也難據為痧但症異凶暴須看痧筋發現便有實據可從痧而理也扶看腿彎有青筋三條刺之紫黑毒血流出甚多反加痰喘此放痧有未盡故也用荊芥金銀花湯加土貝母二錢微冷服二劑少愈次日左足腿彎下又現痧筋一條刺去毒血並刺巔頂一針服前湯加牛膝三錢二劑痧退服紅花湯半月腫痛俱痊一葛隆生次子清晨臂上紅腫大痛次日變為足腿上紅腫大痛乍來乍去隆生以為流火使然延余診其脈厥厥動搖數而又疾余曰脈異於常而症多變殆其痧歟不信服熱湯二日而殂一奚敬峰晚間右大腿紅腫痛方已喉旁發腫而痛延余脈不見異初不覺其為痧也只見時症犯此者多細看兩臂痧筋刺出毒血如注診氣口脈洪實用紫朴湯倍山楂卜子加大黃一錢微冷飲之食消便下而安咳嗽嘔噦痧痧毒之氣上凌肺金故氣逆發嗆而咳嗽痰涎上湧或嘔噦噁心或面目浮腫或心胸煩悶此痧毒入於氣分痧筋往往不現治以刮痧為主間有入於血分者必有痧筋然後刺之臨症用藥宜理痧毒為主若以傷風咳嗽治之則誤矣治驗一俞仲嘉長女五月發熱咳嗽嘔吐痰涎胸中脹悶面目浮腫延他醫服傷風痰嗽之藥四劑心中益脹悶遂止不藥將及一月余偶過求余診之右寸脈虛知其為痧之變症也刮痧訖用防風散痧湯加貝母薄荷童便微冷飲之即痊一王惟誠咳嗽發嗆不絶聲面目俱腫嘔痰不已更吐鮮血延余治之六脈弦緊且數此痧毒之氣搏激於筋脈間故見脈乃爾刺指頭出毒血三針令多為刮痧用寶花散加童便微冷服又用圓紅散微溫服而痊
