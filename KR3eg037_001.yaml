body:
  text: 凡例言有不實治有不效者一句不載藥有不當用有不明者一味不入據症用治立方制宜非痧不録按脈閲筋恐人有誤詳之有據砭刺痧筋必須紫黑毒血據為實見載雜症僅取兼痧諸病虛實悉在所略心腹痧痛刮放即愈不煩醫藥者不多載入治驗不過一二三四惟略見治法為準余不多贅余近地氣稟柔弱故方中分兩從乎減少便能取效此雖傳示四方不敢多加制方分兩甚少若遇西北風高土燥之地剛強勇壯之人其分兩必須加倍或加二倍三倍方能有效飲湯規則云稍冷者九分冷一分溫也云微冷者八分冷二分溫也云微溫者冷者四分之三溫者四分之一也
