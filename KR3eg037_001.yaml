front:
  text: 序憶昔癸未秋余在燕都其時疫病大作患者胸腹稍滿生白毛如羊日死人數千竟不知所名有海昌明經李君見之曰此痧也挑之以針血出病隨手愈於是城中舁而就醫者亦日以千計皆得愈而去頃之症變而為嗽嗽甚輕不半日隨斃時李君已出都有知者曰此亦痧也用前法挑之亦隨愈焉余時目擊其事歸而與知醫者言之卒疑信交半無何則吾鄉挑痧之法盛行矣先是鄉人有糞穢感痧利用錢物蘸油而刮及此多用挑然行之大都婦人以故為名醫者不道及考諸醫書古時未有論及後人稍有青筋之説仍略而不詳因而求人之信者少疑者益多用藥之方遂置之不論人不幸犯是症無得全者噫是可憫也友人右陶郭君明理讀書旁搜醫學見近之患痧者日益衆而治瘀者不聞乃精心殫思推原於小兒痧疹之理兼求之古方多有不言痧而見痧之意者且驗之諸所救療無或爽因以自信遂發願廣之天下後世為百千萬人命之救著有玉衡一書右陶之心切矣右陶之功大矣右陶嘗言痧本無定脈凡脈與所患之症不相應者即為痧之脈痧亦無定症或感風感食感勞感痰而以本症治之不效者皆為痧之症為立之方使知遵也為記之驗使知信也後以藥性終之使知用之有宜不宜不與它症同也右陶治痧之法於是書乎全而世人將讀其書以治痧兼以治右陶之所不及治右陶之心於是大快雖不欲居其功功又安歸哉余既見痧之事又信右陶之説敢為之言雖然不足為愚者道也時康熙十四年乙卯重陽日裡人王庭題自序嘗論一元運化升而為天凝而為地人生其中道配三才惟其克佐天地之所不及也所以大之兵農禮樂小之屠釣工商缺一不可而況炎帝肇創嘗藥療病尤斯人生死所繫者乎歷代相沿神醫迭出載籍紛紛惟救疾苦孰意痧脹一症時有懸命須臾兆變頃刻者竟置不論如雲林龔先生所志諸書歷有年矣迄今誦法不衰時多宗之然云青筋所謂痧也惜自古以來從未論及是以其疾往往不治余竊以為生死甚大望醫如望拯溺詎可聽人之有是疾而不為之生全乎余高曾以經術起家箕裘纍葉余少列宮牆讀古惠鮮懷保慨然有恫恤生民之志嘗願為愁者解困危者蘇命因遍閲仲景東垣丹溪諸先生論而帖括所拘有懷未展鼎革以後播遷不一或羈留武水或跋涉秦溪每憶昔年尋章摘句不過淹蹇一身毫無裨益於世既而旅食江淮浪遊吳越所在時行痧脹被禍不少余心惻然思得一術以濟之竊恐世人犯而不識多有坐視其死者故凡遇杏林先輩未嘗不造而問焉見松隱異人未嘗不就而請焉即册籍所載鮮不於晤對之間互相參考然於痧也究不得一要旨以後返棹槜李搜求高曾所遺前賢諸祕草有其傳變難治異症或定於濂洛大儒或議諸楚粵高士雖篇頁零星各有同異皆透參靈素甲乙諸經以推廣仲景先生之意惜專籍無傳沉埋日久而古人精祕尚未出也餘日夕究心始悟痧脹變端總其大綱撮其要領遂得歷歷措施無不響驗余特慮斯疾勿辨貽禍無窮故為之推原其始詳究其終深憫斯疾之為害不忍不有斯集也雖然醫者治疾尤百工治事此握一規彼挾一矩有一定之法無一定之用故余雖獲遺言尤必酌量於纍黍之度而神明其治法焉此非昔人無是疾今人始有是疾也抑非昔人之病可略今人之病當獨詳也余所以念茲在茲日孜孜焉從事筆墨間惟此救人是論要不外夫推己之心俾天下咸慰及人之願斯已耳昔人有言道之真以治身其緒餘以為天下余獨不敢云治身與為天下有二也蓋醫之為道惟視人如己者乃可施至於風氣之強弱年歲之多寡精力之厚薄必須以己為斷然後原疾量藥貫微徹幽度節氣而候溫涼參脈理而合輕重始乃取應如神捷於桴鼓不然鹵莽從事是尤南轅而返北轍也烏可得哉時大清康熙十四年歲次乙卯燈月槜李郭志邃右陶氏自序於裕賢堂續序嘗稽古今醫學備悉萬病獨不明痧因而人鮮其傳無奈世之患者比比也既有此病不可不求有以治之余因以治之所驗悉其症之所由於甲寅歲著玉衡一書偕同人互相參訂急而行之亦濟生之念所不得已也書中凡敘痧説似已具詳兩年來痧之變幻更有隱伏於別病中者傷人最多非為世所罕識尤余前書之所未及因又有痧刻之續凡以因時所犯略採異驗為集夫亦謀諸同人非敢以自矜也幸天下不以多贅而忽諸大清康熙十七年戊午歲季秋吉旦郭志邃右陶文載識
