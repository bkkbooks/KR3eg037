body:
  text: 卷之下霍亂痧痛而不吐瀉者名乾霍亂毒入血分宜放痧新食宜吐久食宜消食下結宜攻痛而吐瀉者毒入氣分宜刮痧不愈視有痧筋則放宜調其陰陽之氣為主須知腸胃食積宜驅不宜止止則益痛若吐瀉而後痛者此因瀉糞穢氣所觸治宜略用藿香正氣冷飲然必須除食積血滯或消或攻或活血山藥茯苓不可亂施燥濕之劑俱在所禁溫暖之藥未可亂投治驗一沈篆玉九月間乾霍亂腹中盤腸大痛放痧三十餘針又王君先為之刮痧不愈余用寶花散加大黃丸清茶稍冷飲之而痊一彭君明晚間腹中大痛吐瀉數十次痛益甚延余診之左脈芤而滑右脈弦細而澀此宿食已從吐瀉而盡乃毒入血分血瘀作痛也放痧不愈用獨活紅花湯圓紅散微溫飲之吐瀉腹痛少愈次日服前藥吐瀉腹痛俱已一童敬橋內室吐瀉腹痛自刮痧服陰陽水痛益甚余用三香丸微冷飲之而安絞痛痧心腹絞絞大痛或如板硬或如繩縛或如筋吊或如錐觸或如刀割痛極難忍輕者亦微微絞痛脹悶非常放痧可愈若不愈必審脈症何因辨暑穢食積痰血所阻施治須連進數服俟其少安方可漸為調理此症世多放痧數次不愈聽命於天不肯服藥遂至痧毒攻壞臟腑惟死而已惜哉治驗一廉齊朱先生夫人夏月痧痛危急刮痧放痧不愈更易三醫莫敢任事舉家無措宋臣王兄邀余往視六脈微伏治之未愈其晚絞痛如前明晨賢郎宋伊兄復邀余右手脈伏更放痧三十二針兼刮痧訖用寶花散沉香丸清茶稍冷飲之並用散痧解毒活血順氣之劑親友尚恐無救留余俟飯後坦君云夏王兄曰睡矣何如余曰睡則神情已定氣血漸和殆將安越翼日乃廖一賈公清作瀉腹痛如繩絞延余脈洪大數實放痧不愈用烏藥順氣湯加大黃下積而痊一故友麓庵朱兄夫人公範母也口吐痰涎腹中絞痛醫治沉重六日不愈延余診之左脈微伏余曰痧也令刮之少安用藥不服次日復昏沉大痛舉家驚惶親戚填門復延余刺左中指一針出毒血兼令刮痧不愈用降香桃花散沖砂仁湯微冷送下並用防風散痧湯加山豆根茜草丹參金銀花山楂卜子稍冷服而安一何君雅子正月盤腸絞痛延余脈伏令刮痧用沉香郁金散稜術湯冷飲之稍愈黃昏時復絞痛非常叫喊不已復邀余用細辛大黃丸清茶微冷飲之又用紫朴湯而痊脅痛痧痧症不忌食物痧毒裹食結成痧塊於脅而痛其痧塊變症甚多故為難治且治痧惟在初發若不識或飲熱湯毒血凝結即慢痧不至脹急傷人亦成脅痛瘀之日久勢必難散治驗一朱子佩夫人身熱吐痰脅痛飲圓湯益喘嘔不已延余左脈洪數右脈似伏余曰痧也子佩刺其腿彎痧筋二針不愈服童便喘嘔稍減余用阿魏丸大黃丸白湯微冷下身熱吐痰俱已又用必勝湯微冷下三服而痊一王養初子佩母舅也吐痰脅痛誤吃圓肉放痧數次日久不愈延余診之余辭不治以痧毒裹圓結成痧塊不可解耳況日久攻壞臟腑雖藥無益後易數醫變喉旁發腫而歿痧痢夏傷於暑秋必瘧痢痢疾初發必先泄瀉腸胃泄瀉必致空虛內虛則易感觸穢惡之氣即成痧痛或天氣炎熱時行疫癘感動腸胃因積而發亦致痧痛夫痢不兼痧積去之後便可得痊即甚凶極藥無不效若一兼痧勢必絞痛異常止治其痢用藥無效或變痢如豬肝色或變痢如屋漏水或變痢惟血紅水或變噤口不食嘔噦凶危或變休息久痢歲月綿延常苦痢患余惟先治其痧兼治其積則痧消而積易去積去而痧可清凡遇痢疾如此治之無不奏功誠為良法治驗一曾奉先七月間發熱下痢血水日百餘次肛門急迫腹痛異常嘔噦不食延余治之六脈遲數不常或時歇指此痧痢也刮痧放痧訖痛乃減半用沉香阿魏丸砂仁湯稍冷飲之用當歸山楂紅花枳實赤芍澤蘭青皮卜子檳榔各一錢熟大黃五分加童便一鍾稍冷飲二服痢下赤白甚多諸症俱愈一余弟驤武下赤白痢日數十餘次腹中大痛大便窘迫余診之六脈微細放痧二十針又刮痧不愈用寶花散沉香阿魏丸稍冷湯飲之腹痛漸寧用當歸山楂陳皮檳榔紅花烏藥各一錢熟大黃八分加童便飲之赤白俱下痛亦漸安後用當歸一兩山楂二錢服之赤白痢全愈一奚仲嘉內室腹中絞痛喘急氣逆余診六脈無根此痧脹也放痧不愈用沉香阿魏丸砂仁煎湯稍冷飲之痛遂止次日小腹痛頻下痢赤白用當歸金銀花青皮陳皮烏藥山楂卜子加童便稍冷飲之漸稀用當歸一兩服四劑而愈一吳瑞雲發熱脹悶沉重放痧後痢下紫血他醫以痧氣已清但治其痢勢在危篤舉家驚惶延余六脈洪大不勻此痧氣未清痧毒尚盛也令刮痧訖用當歸枳殼湯入童便冷飲之次以蘇木紅花五靈脂茜草烏藥香附當歸赤芍以導其瘀乃安後發餘毒於肛門邊出膿而愈蛔結痧痧毒攻胃故蛔死入於大腸與宿糞相結腹中大痛是為蛔結治驗一朱子佩女痧發痛極頭汗如雨延余診之脈芤而洪實放痧不出刮痧不起用細辛大黃丸微冷服又用荊芥銀花湯稍冷服又三日痧筋乃現放之服藥如前腹痛不止至十九日日用藥加大黃大便下死蛔三條結糞亦下痛尤不止又現痧筋放之服前藥乃愈頭痛痧痧毒中於臟腑之氣閉塞不通上攻三陽顛頂故痛入腦髓發暈沉重不省人事名真頭痛朝發夕死夕發旦死急刺破巔頂出毒血以泄其氣藥惟破其毒氣清其臟腑為主痧毒中於臟腑之血壅瘀不流上衝三陽頭面肌肉故肌肉腫脹目閉耳塞心胸煩悶急刺破巔頂及諸青筋出毒血藥宜清其血分破其壅阻為要治驗一張顯如頭痛發暈沉重六脈俱伏刺巔頂一針余痧筋俱刺少蘇復診其脈沉實而上魚際用清氣化痰飲冷服而安一汪路真內室頭面紅腫發熱頭痛心胸迷悶診脈芤而疾刺左腿彎三針血流如注冷服紅花膏子半杯用蒲黃飲三劑而痊心痛痧痧毒衝心屬之於氣則時痛時止痰涎壅盛昏迷煩悶此其候也治宜刺手臂服順氣之劑為主痧毒攻心屬之於血則大痛不已昏沉不醒此其候也治宜刺腿彎服活血之劑為主遲則難救治驗一鄭延旦次子心中暴痛口吐痰涎迷悶不能出聲延余兩寸沉而伏關尺洪而緊刺痧筋二十針用烏藥順氣湯冷飲四劑而安一嚴瑞宇三女飯時心中暴痛昏沉不醒日暮延余六脈已絶辭之次日而殂腰痛痧痧毒入腎則腰痛不能俯仰若誤飲熱湯熱酒必然煩躁昏迷手足搦搐舌短耳聾垂斃而已治驗一黃敬宇內室腰中大痛強硬如板誤飲熱酒發熱煩躁昏沉痰湧延余左尺虛微右尺洪實脈兼歇指痧中於腎也刺腿彎痧筋僅有紫黑血點不流用降香桃花散微冷服痧筋腿彎復現刺二針血流如注又服二散痧退痛減調理而痊一伍恆生子腰痛放痧四次不痊沉重大痛連及胸脅延余左手無脈辭之六日而殂小腹痛痧痧毒入大小腸則小腹大痛不止形如板推絞絞不已治之須分左右二股屈伸為驗治驗一盛成均子小腹大痛每每左臥左足不能屈伸太陽小腸經痧也痧筋不現用木通湯微冷服四劑方見左腿彎痧筋刺出紫黑毒血二針用紅花湯冷下痧退後調理而愈一範季廉小腹大痛每每右臥右足不能屈伸陽明大腸經痧也刺腿彎青筋四針毒血成流不愈用枳實大黃湯冷服半夜痧退少安後調理而愈一鍾孟芳小腹大痛放痧三次不愈延余治之脈數而疾余曰痧毒已攻壞臟腑矣辭之半月而亡痧塊痧毒留於氣分成氣痞痛留於血分成血塊痛壅於食積阻滯成食積塊痛蓋因刮痧放痧稍愈痧毒未盡不用藥以消之之故施治之法在氣分者用沉香砂仁之類治之在血分者用桃仁紅花之類治之食積阻滯者用卜子檳榔之類治之或氣血二分俱有餘毒者當兼治之若更兼食積所阻有餘毒者當併合治之治驗一王介甫內室腹痛放痧二次忽左脅有塊屢痛不止坐臥不安延余脈芤而沉微此毒留滯不行之故用蘇木散並三香散合桃仁紅花湯微溫服塊消痛減而痊一陳奉山腹中絞痛放痧三次變右脅下塊大痛不止臥不能起延余脈沉實而弦緊此食積為患用阿魏丸並稜術湯加牛膝治之而痊一夏少溪內室腹痛放痧稍愈左脅下變成塊痛口吐痰涎臥床不起延余脈沉而微滑用沉香阿魏丸加貝母白芥子治之而痊一張弘先痧脹變為胸前左乳之上有一點痛辭之半年後吐血而殂痧變吐血鼻衄便紅痧毒衝心則昏迷痧毒沖肺則氣喘痰壅甚則鼻衄痧毒入肝則胸脅疼痛不能轉動甚則血湧由吐而出痧毒流於大腸則大便血流於膀胱則小便血治宜先清其痧毒之氣順其所出之路則氣自順而血自寧矣若不知治緊則變在頃刻遲則變成勞弱或時時便血溺血難愈治驗一孫盛元痧脹放痧不服藥變筋骨疼痛十日後吐血甚多疼痛不愈延余診其脈芤此痧氣已退尚存瘀血用桃仁紅花活血之劑四服而痊一潘國安痧脹鼻衄是痧氣由衄而泄用清涼至寶飲而痊一周瑞亭子六歲痧痛大便紅延余令放痧服散痧消瘀活血之劑而痊一何君叔女痧痛溺血甚多延余令放痧不愈用荊芥薄荷湯加益母金銀花牛膝連翹治之而痊吐蛔瀉蛔痧痧毒入胃胃必熱脹熱脹之極蛔不能存因而上湧乘吐而出或蛔結腹痛不大便或蛔入大腸由大便而出與傷寒吐蛔伏陰在內者不同治宜清其痧脹為主治驗一蔣公尚次女發熱心痛口多痰涎吐蛔二條延余右關沉細而疾餘脈洪數刮痧刺腿彎一針微有紫黑血點服連翹薄荷飲三劑痧退服小柴胡湯身涼而愈一沈存原痧脹吐不止延余脈洪而緊刮痧訖用藥加熟大黃一錢微冷飲之吐止脹消後二日復痧脹吐蛔一條脈復洪緊更用熟大黃一錢微冷飲之痧退而安一湯仲文腹脹大痛延余診之脈散亂無根此蛔結也痧實始之放痧後用散痧去毒之劑加大黃二錢微冷飲之大便下死蛔二條並宿糞而愈痧變腫毒痧毒不盡留滯肌肉腠理之間即成腫毒宜先放痧用散痧解毒之藥以除其根然後審其毒之所發照十二經絡臟腑分陰陽寒熱處治輕則消之重則托之虛則補之實則瀉之若紅腫甚者屬陽用忍冬解毒湯加引經藥以治之白色不紅平腫不易起發者屬陰用參歸化毒湯加引經藥以托之毒有半陰半陽用活絡透毒飲加引經藥透之穿破之後皆用神仙太乙膏貼之若腫毒無膿止有毒水流出或膿少血多用飛龍奪命丹研碎些須填太乙膏中拔去毒水血膿後單用太乙膏貼之毒口難收用紅肉散摻之肉黑者用代刀散以棉花絮微摻之即變紅色貼膏自愈治驗一薑云衢遍身疼痛背發一毒黑爛痛苦求余視診之脈沉微指頭黑色而惡熱飲此痧變惡毒用冷圍藥而成背疽也令去其圍藥放痧訖俟痧氣已絶用參耆薑桂熟附子溫托之外敷以代刀散黑變紅色貼太乙膏而痊一蘇成中長子暑月吐瀉腹中絞痛刮痧痛止兩臂紅腫且癢求餘一方用香薷飲一劑而痊一葛弘先內室痧痛不吐不瀉盤腸絞絞疼痛難忍放痧後頭頂生毒出膿而愈一趙公琰寒熱頭眩心胸煩悶刮痧而愈肛門邊發餘毒出膿成漏為終身之疾備用要方防風散痧湯痧有因於風者此方主之防風陳皮細辛金銀花荊芥枳殼等分頭面腫加薄荷甘菊腹脹加大腹皮厚朴手足腫加葳靈仙牛膝倍金銀花內熱加連翹知母痰多加貝母栝蔞仁寒熱加柴胡獨活吐不止加童便小腹脹痛加青皮血滯加茜草丹參咽喉腫加山豆根射干食積腹痛加山楂卜子心痛加玄胡索蓬朮赤白痢加檳榔口渴加花粉面黑血瘀也加蘇木紅花放痧不出倍細辛蘇木桃仁荊芥穢觸加藿香薄荷水二鍾煎七分稍冷服荊芥湯痧有鬱氣不通者此方主之荊芥防風各一錢川芎三分陳皮青皮連翹各八分食不消加山楂卜子心煩熱去川芎加黑山梔有