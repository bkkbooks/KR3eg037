六分至八分香附行血中之氣恐其香燥須用便制欲其行血必要酒炒取其斂血在乎醋炒用三分至八分木香行滯氣燥濕氣驅寒氣開鬱氣散結氣痧後腹痛不解者此要藥也用一分至三分止檀香痧後心腹疼痛不休胸脅脹悶寒凝氣滯得此而抒者痧之始發當知忌用用一分至三分砂仁順氣開鬱散痧消食此始終之可用之要藥也用三分至一錢穿山甲土炒為末透痧消痰破痧托毒善走經絡之神劑也故經絡有諸藥所不到者非此不達用一分至五分童便解痧毒消痰降火最速定痛治血痢痢下血水諸藥莫及天蠶能治血分之痰佐山甲透經絡以破瘀毒用須炒末自一分至二分烏藥善行周身之氣凡痧氣阻滯者得此無處不到用三分至五分紅花金銀花茜草活血解痧毒用六分至一錢山楂卜子麥芽神麯痧為食壅取其善消而不暴也大黃大便不通痧氣閉塞非此不能攻而下之用五分至一錢五分木通車前澤瀉痧氣鬱阻小便不利在所當求若熱鬱太重不因小水更在所禁用二分至五分黃連黃芩冷性凝滯痧中忌用用須酒炒或薑汁製生地涼血血瘀者非其所宜熟地白芍補血斂血痧所大忌參耆白朮山藥用之恐補毒氣痧所大禁甘草用之恐成痧塊難治在所忌用白茯苓恐其滲濕實其痧氣俱在禁例細辛透竅破血散痧之要藥也用七分至一錢薑黃其性雖溫善能消痰下氣破惡血用二分至四分貝母川者專消熱痰土者兼破瘀血用一錢至一錢五分白芥子脅下之痰非此不達用四分至六分半夏白芷蒼朮性燥忌用竹瀝性寒忌用用須薑汁方走經絡雄黃牛黃膽星天竹黃消痰丸中宜用麝香開竅散痧功亦甚大當歸頭身尾各有所宜用須斟酌柴胡和解表裡專治少陽膽經寒熱往來用六分至一錢乾葛散陽明胃經之邪兼能解渴用六分至八分前胡疏風消痰治嗽表熱者宜用用六分至八分桑皮治嗽瀉肺用四分至八分兜苓瀉肺嗽用三分至五分杏仁瀉肺潤腸胃利氣消痰涎去皮尖用用四分至一錢麥冬天冬潤肺消痰一治其本一治其標去心用之用七分至一錢五分山稜蓬朮食積心疼痧毒阻滯痞悶者宜用六分至八分五靈脂善消宿血血塊凝滯不散非此不破用五分至八分龜甲去兩肋酥炙為末破宿血勝於靈脂在胸者用上半截在下者用下半截蘇木敗惡血新瘀者莫及用五分至一錢五分玄胡索活血行氣氣血凝滯作痛用五分至一錢五分香薷通上徹下利水氣治暑氣之要藥用五分至一錢紫朴寬中治嘔消痰下氣用六分至八分牛膝活血引痧氣下行用八分至二錢木瓜五味子酸斂忌用升麻禁用恐提痧氣上升而難遏也肉桂附子吳茱萸禁用恐助痧毒立刻有變也乾薑過服寒冷之水宜少用之善散寒氣也若用之不當亦能助熱毒當忌麻黃發表太過禁用簿菏辛涼利竅消腫解毒清氣清喉用五分至一錢紫蘇疏風順氣身熱當用三分至六分明礬解痧毒消痰定痛用之探吐宿食甚妙玄參清氣消痰滋陰潤肺但色黑止血痧有瘀血忌用花粉性沉寒止渴痧毒未清者忌用恐凝滯痧氣也角刺透毒能引諸藥至於痧毒血瘀之所立奏其功牛蒡子解痧毒清喉痧中要藥用七分至一錢乳香消瘀血而不傷新血痧症用之以治血結用五分至一錢黑砂糖活瘀血解痧毒故瘀血作痛者得此則安沒藥痧痛用之破瘀血用四分至一錢食鹽解痧毒定痛用之吐去新食芋艿治痧熱解毒有痧患者食之甘美晚蠶沙解痧毒治熱阿魏破積聚逐惡血其功甚大大麻仁消大腸腸胃燥結者宜用其中分數如遇西北強壯人當加一二三倍不可執一痧方余議鬱金價貴時有換之以薑黃者其二味溫涼之性雖有不同然以之治痧下氣消瘀薑黃末為無效若欲入心經散郁消瘀則痧毒攻心者非鬱金不能立奏其功薑黃有所不及故方中所載鬱金切勿以薑黃代之穿山甲土炒用凡痧毒瘀血壅塞阻而不通得此透入經絡引諸藥所不能到者即到所犯經絡血分之所識者其留意焉黑醜通上徹下痧毒脹滿必須用此於丸散中救人立功凡破氣之味俱莫能及但耗散真氣恐人有宜有不宜故方中不載大黃治食積阻痧毒余為丸以備急用其功莫大若痧脹之極必須急服此以攻之恐病有宜有不宜故方中雖載不及細加惟審病症緩急輕重而行之醜黃等分粥丸三分稍冷湯下評半夏藿香止吐凡治吐症用半夏藿香獨痧症作吐半夏性燥須防益助火邪斷不可用若藿香惟取其正氣以治穢濁然亦必痧毒無阻乃可俟冷飲之倘或痧氣有害於中驟用此以止吐反有閉門逐盜之憂如腸胃有食積血瘀留滯痧毒用藿香香燥止吐適長其毒是宜知忌下通痧毒其吐自止評荊芥細辛防風獨活痧症寒熱不由外感往往毒從鼻吸而入搏激肌表羌活麻黃俱在所禁若用荊芥細辛善能透竅蓋惡毒之氣由竅而入故用之以治痧脹亦由竅而泄若防風乃臣使之味僅取為透竅之佐不比麻黃羌活專攻發表反有升宣火毒之慮也至如獨活發散治熱其性至頸而還力不能過發且可活血解痧毒是痧症最要之味歟
